function save(key, val) { try { localStorage.setItem("aimc_"+key, JSON.stringify(val)); } catch(e){} }
function load(key, fallback) { try { const v=localStorage.getItem("aimc_"+key); return v?JSON.parse(v):fallback; } catch(e){ return fallback; } }

function normalizeApiEmail(e) {
  const fromRaw = e.from || "";
  const namePart = fromRaw.includes("<") ? fromRaw.split("<")[0].trim() : fromRaw.split("@")[0];
  return {
    id: e.id || ("api-" + Date.now() + Math.random()),
    from: fromRaw,
    name: namePart || "Unknown",
    subject: e.subject || "(No Subject)",
    date: e.date ? new Date(e.date).toLocaleString() : new Date(e.receivedAt||Date.now()).toLocaleString(),
    body: e.body || e.snippet || "",
    source: "zapier",
  };
}

function buildExport(customers, actions, sfEvents, emails, analysisMap) {
  const out = [];
  out.push("# AI MAIL COMMAND — EXPORT FOR CLAUDE");
  out.push("Exported: " + new Date().toLocaleString());
  out.push("");
  out.push("## CUSTOMER DATABASE (" + customers.length + " contacts)");
  if (!customers.length) { out.push("None yet."); } else {
    customers.forEach(c => {
      out.push("### " + c.name + " — " + c.company);
      out.push("- Email: " + c.email);
      out.push("- Type: " + c.customerType + " | Sentiment: " + c.sentiment);
      out.push("- Emails: " + c.emailCount + " | Last contact: " + c.lastContact);
      if (c.notes) out.push("- Notes: " + c.notes);
      out.push("");
    });
  }
  out.push("## PENDING ACTIONS (" + actions.filter(a=>!a.done).length + " open)");
  const pending = actions.filter(a=>!a.done);
  if (!pending.length) { out.push("None."); } else {
    pending.forEach(a => {
      out.push("- [" + (a.urgency||"").toUpperCase() + "] " + a.task + (a.deadline?" — Due: "+a.deadline:""));
      out.push("  From: " + a.emailSubject);
    });
  }
  out.push("");
  out.push("## ANALYZED EMAILS");
  const analyzed = emails.filter(e=>analysisMap[e.id]);
  if (!analyzed.length) { out.push("None yet."); } else {
    analyzed.forEach(e => {
      const a = analysisMap[e.id];
      out.push("### " + e.subject);
      out.push("From: " + e.from + " | Priority: " + a.priority + " | Sentiment: " + a.sentiment);
      out.push("Summary: " + a.summary);
      if (a.actionItems?.length) out.push("Actions: " + a.actionItems.map(i=>i.task).join("; "));
      out.push("");
    });
  }
  out.push("## SALESFORCE EVENTS (" + sfEvents.length + ")");
  if (!sfEvents.length) { out.push("None yet."); } else {
    sfEvents.forEach(ev => out.push("- ["+ev.type+"] "+ev.subject+" | "+ev.contactName+" @ "+ev.accountName+" | Due: "+ev.activityDate));
  }
  out.push("");
  out.push("---");
  out.push("You now have full context on my customers, actions, and email history. How can you help me?");
  return out.join("\n");
}

async function parseFile(file) {
  const ext = file.name.split(".").pop().toLowerCase();
  const base = { id: Date.now()+Math.random(), name: file.name, ext, size: (file.size/1024).toFixed(1)+" KB", date: new Date().toLocaleDateString() };

  if (["xlsx","xls","csv"].includes(ext)) {
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf, { type:"array" });
    const sheets = {};
    wb.SheetNames.forEach(n => {
      sheets[n] = window.XLSX.utils.sheet_to_json(wb.Sheets[n], { header:1, defval:"" });
    });
    const first = sheets[wb.SheetNames[0]] || [];
    const headers = first[0] || [];
    const rowCount = Math.max(0, first.length - 1);
    return { ...base, type:"excel", sheetNames:wb.SheetNames, sheets, headers, rowCount, colCount:headers.length };
  }

  if (ext === "docx") {
    // Use mammoth via CDN-loaded script if available, else read as binary
    if (window.mammoth) {
      const buf = await file.arrayBuffer();
      const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
      const text = result.value || "";
      return { ...base, type:"word", extractedText:text, wordCount:text.split(/\s+/).filter(Boolean).length };
    } else {
      return { ...base, type:"word", extractedText:"(Word doc uploaded — mammoth.js not loaded)", wordCount:0 };
    }
  }

  if (["txt","md","csv"].includes(ext)) {
    const text = await file.text();
    return { ...base, type:"text", extractedText:text };
  }

  return { ...base, type:"binary" };
}

function fileToText(f, maxRows=150, searchTerms=[]) {
  if (!f) return "";
  if (f.type === "excel") {
    const sheetName = f.sheetNames?.[0];
    const sheet = f.sheets?.[sheetName] || [];
    const header = sheet[0] || [];
    const dataRows = sheet.slice(1);
    let resultRows = [];
    if (searchTerms.length > 0) {
      // Find all rows matching any search term
      const matches = dataRows.filter(row =>
        row.some(c => searchTerms.some(t => String(c ?? "").toLowerCase().includes(t.toLowerCase())))
      );
      if (matches.length > 0) {
        resultRows = matches.slice(0, 2000);
        const headerLine = header.map(c => String(c ?? "")).join("\t");
        const matchLines = resultRows.map(row => row.map(c => String(c ?? "")).join("\t"));
        const note = matches.length > 2000 ? `\n(showing 2000 of ${matches.length} matching rows)` : `\n(${matches.length} matching rows found out of ${dataRows.length} total)`;
        return `[Excel: ${f.name} — ${f.rowCount} rows total]\nFiltered for: ${searchTerms.join(", ")}\n${headerLine}\n${matchLines.join("\n")}${note}`;
      } else {
        // No match found — return first rows so AI can see structure
        const fallback = sheet.slice(0, maxRows+1).map(row => row.map(c => String(c ?? "")).join("\t"));
        return `[Excel: ${f.name} — ${f.rowCount} rows total]\nNo rows matched "${searchTerms.join(", ")}" — showing first ${maxRows} rows:\n${fallback.join("\n")}`;
      }
    }
    const rows = sheet.slice(0, maxRows+1);
    const lines = rows.map(row => row.map(c => String(c ?? "")).join("\t"));
    const extra = sheet.length > maxRows+1 ? `\n(${sheet.length - maxRows - 1} more rows not shown — AI will search by company name automatically)` : "";
    return `[Excel: ${f.name} — ${f.rowCount} rows total, sheet "${sheetName}"]\n` + lines.join("\n") + extra;
  }
  if (f.type === "word" || f.type === "text") {
    const text = f.extractedText || "";
    return `[Doc: ${f.name}]\n` + text.slice(0, 4000) + (text.length > 4000 ? "\n...(truncated)" : "");
  }
  return `[File: ${f.name}]`;
}

// Extract likely search terms from a user question (company names, proper nouns)
function extractSearchTerms(question) {
  // Extract quoted strings first
  const quoted = [...question.matchAll(/"([^"]+)"/g)].map(m => m[1]);
  // Split into words, keep capitalized words/phrases (likely proper nouns)
  const words = question.replace(/[^\w\s\-]/g, " ").split(/\s+/).filter(w => w.length > 2);
  const caps = words.filter(w => /^[A-Z]/.test(w) && !/^(The|And|For|From|What|Which|Where|When|Who|How|Can|Did|Has|Have|Show|Find|List|Tell|Give|Get)$/.test(w));
  // Also extract multi-word company-like phrases (2-4 consecutive capitalized words)
  const phrases = [];
  for (let i = 0; i < words.length - 1; i++) {
    if (/^[A-Z]/.test(words[i]) && /^[A-Z]/.test(words[i+1])) {
      phrases.push(words[i] + " " + words[i+1]);
      if (i+2 < words.length && /^[A-Z]/.test(words[i+2])) {
        phrases.push(words[i] + " " + words[i+1] + " " + words[i+2]);
      }
    }
  }
  return [...new Set([...quoted, ...phrases, ...caps])].slice(0, 10);
}

function buildKbContext(kbData, kbDocs, question="") {
  const searchTerms = question ? extractSearchTerms(question) : [];
  const allDocs = [...(kbDocs||[])];
  KB_KEYS.forEach(k => { (kbData[k]||[]).forEach(d => { allDocs.push({...d, category: k}); }); });
  if (!allDocs.length) return "No knowledge base documents yet.";
  return "KNOWLEDGE BASE:\n\n" + allDocs.map(d => {
    const title = `[${d.category||d.tag||"KB"}] ${d.title||d.name}`;
    const body = d.body||d.content||d.description||"";
    const notes = d.notes?.length ? "\n\nNotes:\n" + d.notes.map(n=>n.text||n).join("\n") : "";
    const files = d.files?.length ? "\n\nAttached Files:\n" + d.files.map(f=>fileToText(f, 150, searchTerms)).join("\n\n") : "";
    return `${title}:\n${body}${notes}${files}`;
  }).join("\n\n---\n\n");
}

          </div>

        <div style={{ overflowX:"auto", maxHeight:380 }}>
          <table style={{ borderCollapse:"collapse", fontSize:12, width:"100%" }}>
            <thead>
              <tr style={{ background:"#f1f5f9", position:"sticky", top:0 }}>
                {headers.map((h,i) => <th key={i} style={{ border:"1px solid #e2e8f0", padding:"6px 10px", textAlign:"left", fontWeight:700, color:"#374151", whiteSpace:"nowrap" }}>{h||`Col ${i+1}`}</th>)}
              </tr>
            </thead>
            <tbody>
              {rows.map((row,ri) => (
                <tr key={ri} style={{ background: ri%2===0 ? "#fff" : "#f8fafc" }}>
                  {headers.map((_,ci) => <td key={ci} style={{ border:"1px solid #f1f5f9", padding:"5px 10px", color:"#374151", maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{row[ci]??""}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  }
  if (file.type === "word" || file.type === "text") {
    return (
      <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:12, marginBottom:14, overflow:"hidden" }}>
        <div style={{ padding:"10px 14px", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", gap:8, background:"#f8fafc" }}>
          <button onClick={onClose} style={{ background:"#0d9488", color:"#fff", border:"none", borderRadius:6, padding:"5px 12px", cursor:"pointer", fontSize:12, fontWeight:700, flexShrink:0 }}>← Back</button>
          <span style={{ fontSize:16 }}>{file.type==="word" ? "📝" : "📄"}</span>
          <span style={{ fontWeight:700, fontSize:13, flex:1 }}>{file.name}</span>
          {file.wordCount && <span style={{ fontSize:11, color:"#64748b" }}>{file.wordCount.toLocaleString()} words</span>}
        </div>
        <div style={{ padding:"14px 18px", maxHeight:420, overflowY:"auto" }}>
          <pre style={{ fontSize:12, color:"#374151", lineHeight:1.8, whiteSpace:"pre-wrap", fontFamily:"Georgia,serif", margin:0 }}>{file.extractedText}</pre>
        </div>
      </div>
    );
  }
  return (
    <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:12, padding:16, marginBottom:14, textAlign:"center", color:"#94a3b8" }}>
      <div style={{ fontSize:28, marginBottom:6 }}>📎</div>
      <div style={{ fontWeight:600, fontSize:13 }}>{file.name}</div>
      <div style={{ fontSize:12, marginTop:4 }}>Preview not available for .{file.ext} files</div>
      <button onClick={onClose} style={{ marginTop:10, background:"#f1f5f9", border:"1px solid #e2e8f0", borderRadius:5, padding:"4px 12px", cursor:"pointer", fontSize:11 }}>Close</button>
    </div>
  );
}

// KB DETAIL PANEL
// ══════════════════════════════════════════════
function KbDetailPanel({ selected, onClose, onDelete, onAddNote, onUploadFile, noteInput, setNoteInput }) {
  const { item } = selected;
  const [viewingFile, setViewingFile] = useState(null);
  const [activeSheet, setActiveSheet] = useState(null);

  function openFile(f) {
    setViewingFile(f);
    setActiveSheet(f.sheetNames?.[0] || null);
  }

  return (
    <div style={{ flex:1, overflowY:"auto", padding:22 }} className="fadein">
      {/* Header */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:16 }}>
        <div>
          <h2 style={{ fontSize:18, fontWeight:800, color:"#0f172a", margin:0 }}>{item.title||item.name}</h2>
          <div style={{ display:"flex", gap:8, marginTop:5, alignItems:"center" }}>
            {(item.tag||item.category) && <span style={{ fontSize:11, background:"#f1f5f9", color:"#64748b", borderRadius:5, padding:"2px 9px" }}>{item.tag||item.category}</span>}
            <span style={{ fontSize:11, color:"#94a3b8" }}>{item.date}</span>
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={onClose} style={{ background:"#0d9488", color:"#fff", border:"none", borderRadius:7, padding:"6px 14px", cursor:"pointer", fontSize:12, fontWeight:700 }}>← AI Chat</button>
          <button onClick={onUploadFile} style={{ background:"#f1f5f9", border:"1px solid #e2e8f0", borderRadius:7, padding:"6px 12px", cursor:"pointer", fontSize:12, fontWeight:600 }}>⬆ Upload File</button>
          <button onClick={() => onDelete(item.id)} style={{ background:"#fef2f2", border:"1px solid #fecaca", borderRadius:7, padding:"6px 12px", cursor:"pointer", fontSize:12, color:"#dc2626" }}>Delete</button>
        </div>
      </div>

      {/* Overview */}
      {(item.description||item.content) && !viewingFile && (
        <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10, padding:"12px 16px", marginBottom:14 }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#94a3b8", marginBottom:6, textTransform:"uppercase", letterSpacing:0.5 }}>Overview</div>
          <p style={{ fontSize:13, color:"#374151", lineHeight:1.7, margin:0, whiteSpace:"pre-wrap" }}>{item.description||item.content}</p>
        </div>
      )}

      {/* File viewer */}
      {viewingFile && (
        <KbFileViewer file={viewingFile} activeSheet={activeSheet} onSheetChange={setActiveSheet} onClose={() => setViewingFile(null)} />
      )}

      {/* Files + Notes grid */}
      {!viewingFile && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
          {/* Files */}
          <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10, padding:"13px 16px" }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#94a3b8", marginBottom:10, textTransform:"uppercase", letterSpacing:0.5 }}>
              📎 Files <span style={{ background:"#f1f5f9", borderRadius:8, padding:"1px 6px", marginLeft:4 }}>{item.files?.length||0}</span>
            </div>
            {!item.files?.length ? (
              <div style={{ fontSize:12, color:"#94a3b8", textAlign:"center", padding:"14px 0" }}>No files yet.<br/><span style={{fontSize:11}}>Supports .xlsx, .xls, .csv, .docx, .txt</span></div>
            ) : item.files.map(f => (
              <div key={f.id} onClick={() => f.type !== "binary" && openFile(f)}
                style={{ background:"#f8fafc", borderRadius:7, padding:"8px 11px", marginBottom:6, cursor: f.type!=="binary" ? "pointer" : "default",
                  border:"1px solid #e2e8f0", transition:"border-color 0.15s" }}
                onMouseEnter={e => f.type!=="binary" && (e.currentTarget.style.borderColor="#0d9488")}
                onMouseLeave={e => e.currentTarget.style.borderColor="#e2e8f0"}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{fontSize:15}}>{f.type==="excel"?"📊":f.type==="word"?"📝":f.type==="text"?"📄":"📎"}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, fontSize:12 }}>{f.name}</div>
                    <div style={{ fontSize:10, color:"#94a3b8", marginTop:1 }}>
                      {f.size}
                      {f.type==="excel" && ` · ${f.rowCount} rows · ${f.sheetNames?.length} sheet(s)`}
                      {f.type==="word" && ` · ${f.wordCount?.toLocaleString()} words`}
                      {" · "}{f.date}
                    </div>
                  </div>
                  {f.type !== "binary" && <span style={{ fontSize:11, color:"#0d9488", fontWeight:600 }}>View →</span>}
                </div>
              </div>
            ))}
          </div>

          {/* Notes */}
          <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10, padding:"13px 16px" }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#94a3b8", marginBottom:10, textTransform:"uppercase", letterSpacing:0.5 }}>
              📝 Notes <span style={{ background:"#f1f5f9", borderRadius:8, padding:"1px 6px", marginLeft:4 }}>{item.notes?.length||0}</span>
            </div>
            <div style={{ display:"flex", gap:6, marginBottom:10 }}>
              <input value={noteInput} onChange={e=>setNoteInput(e.target.value)}
                onKeyDown={e => e.key==="Enter" && onAddNote()}
                placeholder="Add a note… (Enter)" style={{ flex:1, border:"1px solid #e2e8f0", borderRadius:6, padding:"6px 9px", fontSize:12, outline:"none" }}/>
              <button onClick={onAddNote} style={{ background:"#0d9488", border:"none", borderRadius:6, padding:"6px 11px", cursor:"pointer", color:"#fff", fontWeight:700 }}>+</button>
            </div>
            <div style={{ maxHeight:220, overflowY:"auto", display:"flex", flexDirection:"column", gap:6 }}>
              {!item.notes?.length ? (
                <div style={{ fontSize:12, color:"#94a3b8", textAlign:"center", padding:"10px 0" }}>No notes yet.</div>
              ) : item.notes.map(n => (
                <div key={n.id} style={{ background:"#fffbeb", border:"1px solid #fef3c7", borderRadius:7, padding:"7px 11px" }}>
                  <div style={{ fontSize:12, color:"#374151" }}>{n.text}</div>
                  <div style={{ fontSize:10, color:"#94a3b8", marginTop:3 }}>{n.date}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════
function App() {
  const [tab, setTab]           = useState(0);
  const [emails, setEmails]     = useState(()=>load("emails", SAMPLE_EMAILS));
  const [amap, setAmap]         = useState(()=>load("amap", {}));
  const [customers, setCust]    = useState(()=>load("customers", []));
  const [actions, setActs]      = useState(()=>load("actions", []));
  const [sfEvents, setSF]       = useState(()=>load("sf", []));
  const [selEmail, setSelEmail] = useState(null);
  const [loadingId, setLoading] = useState(null);
  const [pasteMode, setPaste]   = useState(false);
  const [pFrom, setPFrom]       = useState("");
  const [pSubj, setPSubj]       = useState("");
  const [pBody, setPBody]       = useState("");
  const [selCust, setSelCust]   = useState(null);
  const [actFilter, setActF]    = useState("all");
  const [selSF, setSelSF]       = useState(null);
  const [sfFilter, setSFFilter] = useState("all");
  const [showExport, setExport] = useState(false);
  const [showClear, setClear]   = useState(false);
  const [saved, setSaved]       = useState(false);
  const [liveStatus, setLiveStatus] = useState("idle");
  const knownIds = useRef(new Set(emails.map(e=>e.id)));

  // ── KB State ──
  const [kbData, setKbData]       = useState(()=>load("kbDataV3", KB_INITIAL));
  const [kbOpen, setKbOpen]       = useState({ projects:false, customers:false, industry:false, paycargo:false, paycargo_vendors:false, paycargo_payers:false });
  const [kbSelected, setKbSelected] = useState(null); // { key, item }
  const [kbModal, setKbModal]     = useState(null);   // { section, type, label }
  const [kbForm, setKbForm]       = useState({ title:"", content:"", tag:"", name:"", description:"", category:"Vendor" });
  const [kbSearch, setKbSearch]   = useState("");
  const [kbNoteInput, setKbNoteInput] = useState("");
  const [kbUploading, setKbUploading] = useState(false);
  const [kbPendingSection, setKbPendingSection] = useState(null);
  const [kbMigrateModal, setKbMigrateModal] = useState(false);
  const [kbMigrateAssign, setKbMigrateAssign] = useState({});
  const kbFileRef = useRef();
  const kbSectionFileRef = useRef();

  // Legacy KB for AI chat
  const [kbDocs, setKbDocs]       = useState(()=>load("kbDocs", []));
  const [kbChat, setKbChat]       = useState([]);
  const [kbInput, setKbInput]     = useState("");
  const [kbLoading, setKbLoading] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => {
    async function fetchLive() {
      try {
        setLiveStatus("checking");
        const res = await fetch("/api/emails");
        if (!res.ok) { setLiveStatus("idle"); return; }
        const data = await res.json();
        if (!data.success || !data.emails?.length) { setLiveStatus("idle"); return; }
        const incoming = data.emails.map(normalizeApiEmail).filter(e => !knownIds.current.has(e.id));
        if (incoming.length > 0) {
          incoming.forEach(e => knownIds.current.add(e.id));
          setEmails(prev => { const withoutSamples = prev.filter(e => !e.id.startsWith("s")); return [...incoming, ...withoutSamples]; });
          setLiveStatus("new");
          setTimeout(() => setLiveStatus("idle"), 4000);
        } else { setLiveStatus("idle"); }
      } catch(e) { setLiveStatus("idle"); }
    }
    fetchLive();
    const interval = setInterval(fetchLive, 60000);
    return () => clearInterval(interval);
  }, []);

  useEffect(()=>{ save("emails",emails); },[emails]);
  useEffect(()=>{ save("amap",amap); },[amap]);
  useEffect(()=>{ save("customers",customers); },[customers]);
  useEffect(()=>{ save("actions",actions); },[actions]);
  useEffect(()=>{ save("sf",sfEvents); setSaved(true); setTimeout(()=>setSaved(false),1500); },[sfEvents]);
  useEffect(()=>{ save("kbDocs",kbDocs); },[kbDocs]);
  useEffect(()=>{ save("kbDataV3",kbData); },[kbData]);

  function clearAll() {
    ["emails","amap","customers","actions","sf"].forEach(k=>{ try{localStorage.removeItem("aimc_"+k);}catch(e){} });
    setEmails(SAMPLE_EMAILS); setAmap({}); setCust([]); setActs([]); setSF([]);
    setSelEmail(null); setSelCust(null); setSelSF(null); setClear(false);
    knownIds.current = new Set(SAMPLE_EMAILS.map(e=>e.id));
  }

  async function analyze(email) {
    if (amap[email.id]) { setSelEmail({...email, analysis:amap[email.id]}); return; }
    setLoading(email.id); setSelEmail({...email, loading:true});
    try {
      const today = new Date().toISOString().split("T")[0];
      const res = await fetch("/api/analyze", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1500,
          system:`You are an expert email assistant and CRM specialist. Analyze emails and return ONLY valid JSON (no markdown) with this structure: {"priority":"urgent|high|medium|low","summary":"2-3 sentence summary","sentiment":"positive|neutral|concerned|negative","customerType":"B2B|B2C|prospect|vendor|internal","keyPoints":["p1","p2","p3"],"actionItems":[{"task":"t","deadline":"d or null","urgency":"urgent|high|medium|low"}],"draftReply":"professional reply","customerProfile":{"name":"full name","email":"email","company":"company","notes":"key info"},"salesforceEvents":[{"type":"Task|Event|Log a Call|Follow-Up","subject":"max 80 chars","description":"log text","priority":"High|Normal|Low","status":"Not Started|In Progress|Completed|Waiting on someone else|Deferred","activityDate":"YYYY-MM-DD today is ${today}","contactName":"name","contactEmail":"email","accountName":"company","callResult":"Connected|Left Voicemail|Not Reached|null","nextStep":"next step","opportunityStage":"Prospecting|Qualification|Needs Analysis|Value Proposition|Id. Decision Makers|Perception Analysis|Proposal/Price Quote|Negotiation/Review|Closed Won|Closed Lost|null","amount":"amount or null","sfNotes":"notes"}]}`,
          messages:[{role:"user",content:"From: "+email.from+"\nSubject: "+email.subject+"\n\n"+email.body}]
        })
      });
      const data = await res.json();
      const raw = data.content?.map(b=>b.text||"").join("")||"{}";
      const analysis = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setAmap(prev=>({...prev,[email.id]:analysis}));
      setSelEmail({...email,analysis});
      if (analysis.customerProfile) {
        setCust(prev=>{ const ex=prev.find(c=>c.email===analysis.customerProfile.email); if(ex) return prev.map(c=>c.email===analysis.customerProfile.email?{...c,notes:analysis.customerProfile.notes,lastContact:email.date,emailCount:(c.emailCount||1)+1,sentiment:analysis.sentiment}:c); return [...prev,{...analysis.customerProfile,id:Date.now(),lastContact:email.date,emailCount:1,sentiment:analysis.sentiment,customerType:analysis.customerType}]; });
      }
      if (analysis.actionItems?.length) setActs(prev=>[...prev,...analysis.actionItems.map(a=>({...a,id:Date.now()+Math.random(),emailSubject:email.subject,done:false}))]);
      if (analysis.salesforceEvents?.length) setSF(prev=>[...prev,...analysis.salesforceEvents.map(e=>({...e,id:Date.now()+Math.random(),emailSubject:email.subject}))]);
    } catch(err) { setSelEmail({...email,error:"Analysis failed. Check your API key and try again."}); }
    setLoading(null);
  }

  async function addPaste() {
    if (!pBody.trim()) return;
    const e={id:"p"+Date.now(),from:pFrom||"unknown@email.com",name:(pFrom||"Unknown").split("@")[0],subject:pSubj||"No Subject",date:new Date().toLocaleString(),body:pBody};
    setEmails(prev=>[e,...prev]); setPaste(false); setPFrom(""); setPSubj(""); setPBody("");
    await analyze(e);
  }

  // ── KB helpers ──
  const kbPersist = (updated) => setKbData(updated);
  const kbToggle = (key) => setKbOpen(p => ({...p, [key]:!p[key]}));
  const kbCount = (key) => (kbData[key]||[]).length;

  const kbAddEntry = (sectionKey) => {
    if (!kbForm.title.trim()) return;
    const entry = { id:Date.now(), title:kbForm.title, content:kbForm.content, tag:kbForm.tag, notes:[], files:[], date:new Date().toLocaleDateString() };
    kbPersist({ ...kbData, [sectionKey]:[...(kbData[sectionKey]||[]), entry] });
    setKbForm({ title:"", content:"", tag:"", name:"", description:"", category:"Vendor" });
    setKbModal(null);
  };

  const kbAddProfile = () => {
    if (!kbForm.name.trim()) return;
    const p = { id:Date.now(), title:kbForm.name, name:kbForm.name, description:kbForm.description, category:kbForm.category, notes:[], files:[], date:new Date().toLocaleDateString() };
    kbPersist({ ...kbData, customers:[...(kbData.customers||[]), p] });
    setKbForm({ title:"", content:"", tag:"", name:"", description:"", category:"Vendor" });
    setKbModal(null);
  };

  const kbDeleteEntry = (sectionKey, id) => {
    kbPersist({ ...kbData, [sectionKey]: kbData[sectionKey].filter(e=>e.id!==id) });
    if (kbSelected?.item?.id === id) setKbSelected(null);
  };

  const kbAddNote = () => {
    if (!kbNoteInput.trim() || !kbSelected) return;
    const note = { id:Date.now(), text:kbNoteInput, date:new Date().toLocaleDateString() };
    const sk = kbSelected.key;
    const updated = { ...kbData, [sk]: kbData[sk].map(e => e.id===kbSelected.item.id ? {...e, notes:[...(e.notes||[]),note]} : e) };
    kbPersist(updated);
    setKbSelected({ ...kbSelected, item: updated[sk].find(e=>e.id===kbSelected.item.id) });
    setKbNoteInput("");
  };

  const kbHandleFileForEntry = async (e, sectionKey, itemId) => {
    const file = e.target.files[0];
    if (!file) return;
    setKbUploading(true);
    try {
      const parsed = await parseFile(file);
      const updated = { ...kbData, [sectionKey]: kbData[sectionKey].map(en => en.id===itemId ? {...en, files:[...(en.files||[]), parsed]} : en) };
      kbPersist(updated);
      setKbSelected({ key:sectionKey, item: updated[sectionKey].find(en=>en.id===itemId) });
    } catch(err) { alert("Error parsing file: "+err.message); }
    setKbUploading(false);
    e.target.value = "";
  };

  const kbHandleFileForSection = async (e, sectionKey) => {
    const file = e.target.files[0];
    if (!file) return;
    setKbUploading(true);
    try {
      const parsed = await parseFile(file);
      const entry = { id:Date.now(), title:file.name, content:"", tag:file.ext?.toUpperCase()||"FILE", notes:[], files:[parsed], date:new Date().toLocaleDateString() };
      const updated = { ...kbData, [sectionKey]:[...(kbData[sectionKey]||[]), entry] };
      kbPersist(updated);
      setKbSelected({ key:sectionKey, item:entry });
    } catch(err) { alert("Error parsing file: "+err.message); }
    setKbUploading(false);
    e.target.value = "";
  };

  const kbGetFiltered = (key) => {
    const items = kbData[key]||[];
    if (!kbSearch) return items;
    const q = kbSearch.toLowerCase();
    return items.filter(i => (i.title||i.name||"").toLowerCase().includes(q) || (i.content||i.description||"").toLowerCase().includes(q));
  };

  const uOrder={urgent:0,high:1,medium:2,low:3};
  const fActions=actions.filter(a=>actFilter==="done"?a.done:actFilter==="pending"?!a.done:true).sort((a,b)=>(uOrder[a.urgency]??3)-(uOrder[b.urgency]??3));
  const fSF=sfEvents.filter(e=>sfFilter==="all"||e.type===sfFilter);
  const exportText=buildExport(customers,actions,sfEvents,emails,amap);

  const card=(selected)=>({background:selected?"#eef2f7":"#ffffff",border:"1px solid "+(selected?"#b0c8e0":"#dde4ec"),borderRadius:10,cursor:"pointer",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"});
  const panel={background:"#ffffff",border:"1px solid #dde4ec",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"};
  const section={background:"#f8fafc",borderRadius:10,padding:14,border:"1px solid #dde4ec",marginBottom:14};
  const sectionLabel={fontSize:10,fontWeight:700,color:"#0d7a6b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8};

  const LiveDot = () => {
    if (liveStatus==="new") return <span style={{fontSize:11,color:"#0a9e6b",fontWeight:700,fontFamily:"'DM Mono',monospace",animation:"pulse 1s ease infinite"}}>● New email!</span>;
    if (liveStatus==="checking") return <span style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace"}}><span style={{display:"inline-block",width:8,height:8,border:"1.5px solid #8a9ab0",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite",marginRight:4}}/>checking…</span>;
    return <span style={{fontSize:11,color:"#b0bcc8",fontFamily:"'DM Mono',monospace"}}>● live</span>;
  };

  return (
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#f0f4f8",minHeight:"100vh",color:"#1a2540"}}>
      {showExport && <ExportModal text={exportText} onClose={()=>setExport(false)}/>}
      {showClear  && <ConfirmModal onConfirm={clearAll} onCancel={()=>setClear(false)}/>}

      {/* HEADER */}
      <div style={{background:"#fff",borderBottom:"1px solid #dde4ec",padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#0d7a6b,#0a5a8a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>✉</div>
          <div>
            <div style={{fontWeight:700,fontSize:17,letterSpacing:"-0.3px"}}>AI Mail Command</div>
            <div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace"}}>Gmail AI Review · Powered by Claude</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <LiveDot/>
          {saved && <span style={{fontSize:11,color:"#0d7a6b",fontWeight:600,fontFamily:"'DM Mono',monospace"}}>✓ Saved</span>}

                      <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>📋 Full Block</div>
                      <pre style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#5a7090",whiteSpace:"pre-wrap",lineHeight:1.8,margin:0}}>{sfBlock(selSF)}</pre>
                      <div style={{marginTop:14}}><CopyBtn text={sfBlock(selSF)} label="Copy Entire Block" big={true}/></div>
                    </div>
                  </div>
                </div>}
              </div>
            </>}
          </div>
        )}

        {/* ── KNOWLEDGE BASE ── */}
        {tab===4 && (
          <div style={{display:"grid", gridTemplateColumns:"270px 1fr", gap:16, minHeight:"75vh"}}>

            {/* Hidden file inputs */}
            <input type="file" ref={kbFileRef} style={{display:"none"}} accept=".xlsx,.xls,.csv,.docx,.txt,.md,.pdf,.pptx"
              onChange={e => kbSelected && kbHandleFileForEntry(e, kbSelected.key, kbSelected.item.id)} />
            <input type="file" ref={kbSectionFileRef} style={{display:"none"}} accept=".xlsx,.xls,.csv,.docx,.txt,.md,.pdf,.pptx"
              onChange={e => kbPendingSection && kbHandleFileForSection(e, kbPendingSection)} />

            {/* ── LEFT SIDEBAR ── */}
            <div style={{background:"#fff", border:"1px solid #dde4ec", borderRadius:12, display:"flex", flexDirection:"column", overflow:"hidden"}}>
              <div style={{padding:"13px 13px 9px", borderBottom:"1px solid #eef2f7"}}>
                <div style={{fontWeight:700, fontSize:13, color:"#0f172a", marginBottom:8, display:"flex", alignItems:"center", gap:6, justifyContent:"space-between"}}>
                  <span style={{display:"flex",alignItems:"center",gap:6}}><span>🧠</span> Knowledge Base</span>
                  {load("kbDocs",[]).length>0 && <button onClick={()=>{ const old=load("kbDocs",[]); const init={}; old.forEach(d=>{ init[d.id]=d.category==="Project"?"projects":d.category==="Customer"?"customers":d.category==="Pricing"?"paycargo_vendors":d.category==="Vendor"?"paycargo_vendors":d.category==="Process"?"industry":"industry"; }); setKbMigrateAssign(init); setKbMigrateModal(true); }} style={{fontSize:10,background:"#fef3c7",border:"1px solid #fcd34d",color:"#b45309",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>📦 Import old</button>}
                </div>
                <input value={kbSearch} onChange={e=>setKbSearch(e.target.value)} placeholder="Search all sections…"
                  style={{width:"100%", border:"1px solid #e2e8f0", borderRadius:6, padding:"5px 9px", fontSize:12, outline:"none", background:"#f8fafc", boxSizing:"border-box"}}/>
              </div>

              <div style={{flex:1, overflowY:"auto"}}>
                {KB_SECTIONS.map(sec => (
                  <div key={sec.key}>
                    {/* Section toggle */}
                    <button onClick={() => kbToggle(sec.key)}
                      style={{width:"100%", background:"none", border:"none", borderBottom:"1px solid #f1f5f9", padding:"9px 11px", cursor:"pointer", display:"flex", alignItems:"center", gap:6, textAlign:"left"}}>
                      <span style={{fontSize:10, color:"#94a3b8", display:"inline-block", transform: kbOpen[sec.key]?"rotate(90deg)":"rotate(0deg)", transition:"transform 0.15s"}}>▶</span>
                      <span style={{fontSize:14}}>{sec.icon}</span>
                      <span style={{flex:1, fontWeight:600, fontSize:12, color:"#1e293b"}}>{sec.label}</span>
                      <span style={{fontSize:10, background:sec.bg, color:sec.color, borderRadius:9, padding:"1px 6px", fontWeight:700}}>
                        {sec.children ? sec.children.reduce((a,c)=>a+kbCount(c.key),0) : kbCount(sec.key)}
                      </span>
                    </button>

                    {kbOpen[sec.key] && (
                      <div style={{background:"#fafafa"}}>
                        {sec.children ? (
                          sec.children.map(child => (
                            <div key={child.key}>
                              <button onClick={() => kbToggle(child.key)}
                                style={{width:"100%", background:"none", border:"none", borderBottom:"1px solid #f1f5f9", padding:"7px 11px 7px 26px", cursor:"pointer", display:"flex", alignItems:"center", gap:5, textAlign:"left"}}>
                                <span style={{fontSize:9, color:"#94a3b8", display:"inline-block", transform: kbOpen[child.key]?"rotate(90deg)":"rotate(0deg)", transition:"transform 0.15s"}}>▶</span>
                                <span style={{fontSize:13}}>{child.icon}</span>
                                <span style={{flex:1, fontWeight:600, fontSize:12, color:"#374151"}}>{child.label}</span>
                                <span style={{fontSize:10, background:child.bg, color:child.color, borderRadius:8, padding:"1px 5px", fontWeight:700}}>{kbCount(child.key)}</span>
                              </button>
                              {kbOpen[child.key] && (
                                <KbSectionItems items={kbGetFiltered(child.key)} sectionKey={child.key} color={child.color} selected={kbSelected}
                                  onSelect={item => { setKbSelected({key:child.key, item}); }}
                                  onAdd={() => setKbModal({section:child.key, type:"entry", label:child.label})}
                                  onUpload={sk => { setKbPendingSection(sk); kbSectionFileRef.current.click(); }}
                                  indent={40} />
                              )}
                            </div>
                          ))
                        ) : (
                          <KbSectionItems items={kbGetFiltered(sec.key)} sectionKey={sec.key} color={sec.color} selected={kbSelected}
                            onSelect={item => { setKbSelected({key:sec.key, item}); }}
                            onAdd={() => setKbModal({section:sec.key, type: sec.isProfiles?"profile":"entry", label:sec.label})}
                            onUpload={sk => { setKbPendingSection(sk); kbSectionFileRef.current.click(); }}
                            indent={24} />
                        )}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* ── RIGHT PANEL ── */}
            <div style={{background:"#fff", border:"1px solid #dde4ec", borderRadius:12, display:"flex", flexDirection:"column", overflow:"hidden"}}>
              {kbUploading ? (
                <div style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, gap:10}}>
                  <div style={{fontSize:32}}>⏳</div>
                  <div style={{fontWeight:600, color:"#0d9488", fontSize:14}}>Parsing file…</div>
                  <div style={{fontSize:12, color:"#64748b"}}>Extracting content from your document</div>
                </div>
              ) : kbSelected ? (
                <KbDetailPanel
                  selected={kbSelected}
                  onClose={() => setKbSelected(null)}
                  noteInput={kbNoteInput}
                  setNoteInput={setKbNoteInput}
                  onAddNote={kbAddNote}
                  onDelete={(id) => kbDeleteEntry(kbSelected.key, id)}
                  onUploadFile={() => kbFileRef.current.click()}
                />
              ) : (
                /* AI Chat */
                <div style={{display:"flex", flexDirection:"column", height:"100%"}}>
                  <div style={{padding:"14px 18px", borderBottom:"1px solid #eef2f7"}}>
                    <div style={{fontSize:14, fontWeight:700, marginBottom:2}}>🧠 AI Assistant</div>
                    <div style={{fontSize:11, color:"#8a9ab0"}}>Ask anything about your customers, pricing, vendors, or projects · or click any doc to view & edit it</div>
                  </div>
                  <div style={{flex:1, overflowY:"auto", padding:"14px 18px", display:"flex", flexDirection:"column", gap:12}}>
                    {kbChat.length===0 && (
                      <div style={{textAlign:"center", paddingTop:50, color:"#b0bcc8"}}>
                        <div style={{fontSize:36, marginBottom:10}}>💬</div>
                        <div style={{fontSize:13, fontWeight:500, marginBottom:8}}>Ask me anything</div>
                        <div style={{fontSize:11, lineHeight:1.8, color:"#c0ccd8"}}>
                          "What's the pricing for Acme Corp?"<br/>
                          "Which vendors does my customer use?"<br/>
                          "What's the status of the Miami project?"<br/>
                          "Summarize my notes on this customer"
                        </div>
                        <div style={{marginTop:16, fontSize:11, color:"#a0b0c0"}}>← Expand a section on the left to browse or add entries</div>
                      </div>
                    )}
                    {kbChat.map((msg,i)=>(
                      <div key={i} style={{display:"flex", flexDirection:msg.role==="user"?"row-reverse":"row", gap:8, alignItems:"flex-start"}}>
                        <div style={{width:26, height:26, borderRadius:"50%", background:msg.role==="user"?"#0d7a6b":"linear-gradient(135deg,#0d7a6b,#0a5a8a)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, color:"white", flexShrink:0}}>{msg.role==="user"?"You":"AI"}</div>
                        <div style={{background:msg.role==="user"?"#f0faf6":"#f8fafc", border:"1px solid", borderColor:msg.role==="user"?"#b0ddd0":"#e0e8f0", borderRadius:9, padding:"9px 12px", maxWidth:"80%", fontSize:13, color:"#2a3a50", lineHeight:1.7, whiteSpace:"pre-wrap"}}>{msg.content}</div>
                      </div>
                    ))}
                    {kbLoading && <div style={{display:"flex",gap:8,alignItems:"center"}}><div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#0d7a6b,#0a5a8a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"white"}}>AI</div><div style={{background:"#f8fafc",border:"1px solid #e0e8f0",borderRadius:9,padding:"9px 12px",fontSize:12,color:"#8a9ab0",display:"flex",gap:6,alignItems:"center"}}><div style={{width:9,height:9,border:"2px solid #0d7a6b",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Thinking…</div></div>}
                    <div ref={chatEndRef}/>
                  </div>
                  <div style={{padding:"10px 14px", borderTop:"1px solid #eef2f7", display:"flex", gap:8}}>
                    <textarea value={kbInput} onChange={e=>setKbInput(e.target.value)}
                      onKeyDown={async e=>{
                        if(e.key==="Enter"&&!e.shiftKey){
                          e.preventDefault();
                          if(!kbInput.trim()||kbLoading) return;
                          const question = kbInput.trim();
                          setKbInput(""); setKbChat(prev=>[...prev,{role:"user",content:question}]); setKbLoading(true);
                          try {
                            const kbContext = buildKbContext(kbData, kbDocs, question);
                            const res = await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:`You are a helpful AI assistant for Isaac Adams, Director of Enterprise Development at PayCargo. You have access to his knowledge base including Excel spreadsheet data, vendor lists, customer profiles and project notes. The Excel files contain thousands of rows — up to 10,000 rows are provided. Scan ALL provided rows to find the requested company or data. Never say you cannot find something without first thoroughly searching all rows. Cite specific numbers when referencing data.\n\n${kbContext}`,messages:[...kbChat.map(m=>({role:m.role,content:m.content})),{role:"user",content:question}]})});
                            const data = await res.json();
                            const answer = data.content?.map(b=>b.text||"").join("")||"Sorry, couldn't get a response.";
                            setKbChat(prev=>[...prev,{role:"assistant",content:answer}]);
                          } catch(err) { setKbChat(prev=>[...prev,{role:"assistant",content:"Error getting response. Please try again."}]); }
                          setKbLoading(false);
                          setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
                        }
                      }}
                      placeholder="Ask about your customers, pricing, vendors, projects… (Enter to send)"
                      rows={2} style={{flex:1,background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:7,padding:"8px 10px",color:"#1a2540",fontSize:13,resize:"none",fontFamily:"inherit"}}/>
                    <button onClick={async()=>{
                      if(!kbInput.trim()||kbLoading) return;
                      const question=kbInput.trim(); setKbInput(""); setKbChat(prev=>[...prev,{role:"user",content:question}]); setKbLoading(true);
                      try {
                        const kbContext = buildKbContext(kbData, kbDocs, question);
                        const res=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:`You are a helpful AI assistant for Isaac Adams, Director of Enterprise Development at PayCargo. You have access to his knowledge base including Excel spreadsheet data, vendor lists, customer profiles and project notes. The Excel files contain thousands of rows — up to 10,000 rows are provided. Scan ALL provided rows to find the requested company or data. Never say you cannot find something without first thoroughly searching all rows. Cite specific numbers when referencing data.\n\n${kbContext}`,messages:[...kbChat.map(m=>({role:m.role,content:m.content})),{role:"user",content:question}]})});
                        const data=await res.json();
                        setKbChat(prev=>[...prev,{role:"assistant",content:data.content?.map(b=>b.text||"").join("")||"Sorry, couldn't get a response."}]);
                      } catch(err){setKbChat(prev=>[...prev,{role:"assistant",content:"Error. Please try again."}]);}
                      setKbLoading(false); setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
                    }} style={{background:"#0d7a6b",border:"none",color:"white",borderRadius:7,padding:"0 16px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",alignSelf:"stretch"}}>Send</button>
                  </div>
                </div>
              )}
            </div>

            {/* ── MIGRATE OLD DATA MODAL ── */}
            {kbMigrateModal && (()=>{
              const oldDocs = load("kbDocs",[]);
              const sectionOptions = [
                {key:"projects", label:"📋 Projects"},
                {key:"customers", label:"🏭 Customer Profiles"},
                {key:"industry", label:"🌐 Industry Knowledge"},
                {key:"paycargo_vendors", label:"📦 PayCargo › Vendors"},
                {key:"paycargo_payers", label:"💳 PayCargo › Payers"},
              ];
              return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
                <div style={{background:"#fff",borderRadius:16,padding:24,width:560,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <h2 style={{fontSize:15,fontWeight:800,color:"#0f172a"}}>📦 Import Old Knowledge Base ({oldDocs.length} items)</h2>
                    <button onClick={()=>setKbMigrateModal(false)} style={{background:"none",border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:12}}>✕</button>
                  </div>
                  <p style={{fontSize:12,color:"#64748b",marginBottom:14}}>Assign each item to a section, then click Import All.</p>
                  <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                    {oldDocs.map(doc=>(
                      <div key={doc.id} style={{display:"flex",alignItems:"center",gap:10,background:"#f8fafc",borderRadius:8,padding:"8px 12px",border:"1px solid #e2e8f0"}}>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,fontSize:13,color:"#1e293b"}}>{doc.title}</div>
                          <div style={{fontSize:11,color:"#94a3b8"}}>{doc.category} · {doc.date}</div>
                        </div>
                        <select value={kbMigrateAssign[doc.id]||"projects"} onChange={e=>setKbMigrateAssign(p=>({...p,[doc.id]:e.target.value}))}
                          style={{border:"1px solid #e2e8f0",borderRadius:6,padding:"4px 8px",fontSize:12,background:"#fff",cursor:"pointer"}}>
                          {sectionOptions.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                        </select>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{
                      const updated = {...kbData};
                      oldDocs.forEach(doc=>{
                        const sk = kbMigrateAssign[doc.id]||"projects";
                        const entry = { id:Date.now()+Math.random(), title:doc.title, content:doc.body||"", tag:doc.category||"", notes: doc.notes?(typeof doc.notes==="string"?[{id:Date.now(),text:doc.notes,date:doc.date}]:[]):[],
                          files:[], date:doc.date||new Date().toLocaleDateString(), items:doc.items||[] };
                        updated[sk] = [...(updated[sk]||[]), entry];
                      });
                      kbPersist(updated);
                      // Clear old docs so button disappears
                      try{localStorage.removeItem("aimc_kbDocs");}catch(e){}
                      setKbDocs([]);
                      setKbMigrateModal(false);
                    }} style={{flex:1,background:"#0d7a6b",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13}}>
                      ✅ Import All to New Sections
                    </button>
                    <button onClick={()=>setKbMigrateModal(false)} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 16px",cursor:"pointer",fontSize:13}}>Cancel</button>
                  </div>
                </div>
              </div>;
            })()}

            {/* ── ADD MODAL ── */}
            {kbModal && (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
                <div style={{background:"#fff",borderRadius:14,padding:24,width:420,boxShadow:"0 20px 60px rgba(0,0,0,0.18)"}}>
                  <h2 style={{fontSize:14,fontWeight:700,marginBottom:16,color:"#0f172a"}}>
                    {kbModal.type==="profile" ? "🏭 New Company Profile" : `➕ Add to ${kbModal.label}`}
                  </h2>
                  {kbModal.type==="profile" ? (
                    <div style={{display:"flex",flexDirection:"column",gap:9}}>
                      <input value={kbForm.name} onChange={e=>setKbForm({...kbForm,name:e.target.value})} placeholder="Company name (e.g. UPS, DHL, DP World) *" style={{border:"1px solid #cbd5e1",borderRadius:7,padding:"8px 11px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"}}/>
                      <select value={kbForm.category} onChange={e=>setKbForm({...kbForm,category:e.target.value})} style={{border:"1px solid #cbd5e1",borderRadius:7,padding:"8px 11px",fontSize:13,outline:"none",background:"#fff"}}>
                        {PROFILE_TAGS.map(t=><option key={t}>{t}</option>)}
                      </select>
                      <textarea value={kbForm.description} onChange={e=>setKbForm({...kbForm,description:e.target.value})} placeholder="Description / overview…" rows={3} style={{border:"1px solid #cbd5e1",borderRadius:7,padding:"8px 11px",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
                    </div>
                  ) : (
                    <div style={{display:"flex",flexDirection:"column",gap:9}}>
                      <input value={kbForm.title} onChange={e=>setKbForm({...kbForm,title:e.target.value})} placeholder="Title *" style={{border:"1px solid #cbd5e1",borderRadius:7,padding:"8px 11px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"}}/>
                      <input value={kbForm.tag} onChange={e=>setKbForm({...kbForm,tag:e.target.value})} placeholder="Tag (e.g. Active, Pricing, Strategy)" style={{border:"1px solid #cbd5e1",borderRadius:7,padding:"8px 11px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"}}/>
                      <textarea value={kbForm.content} onChange={e=>setKbForm({...kbForm,content:e.target.value})} placeholder="Content / notes…" rows={4} style={{border:"1px solid #cbd5e1",borderRadius:7,padding:"8px 11px",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
                    </div>
                  )}
                  <div style={{display:"flex",gap:8,marginTop:16}}>
                    <button onClick={()=>kbModal.type==="profile"?kbAddProfile():kbAddEntry(kbModal.section)} style={{background:"#0d7a6b",color:"#fff",border:"none",borderRadius:7,padding:"9px 18px",cursor:"pointer",fontWeight:700,fontSize:13}}>Save</button>
                    <button onClick={()=>setKbModal(null)} style={{background:"#f1f5f9",color:"#374151",border:"1px solid #e2e8f0",borderRadius:7,padding:"9px 16px",cursor:"pointer",fontSize:13}}>Cancel</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
