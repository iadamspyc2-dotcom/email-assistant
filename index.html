function save(key, val) { try { localStorage.setItem("aimc_"+key, JSON.stringify(val)); } catch(e){} }
function load(key, fallback) { try { const v=localStorage.getItem("aimc_"+key); return v?JSON.parse(v):fallback; } catch(e){ return fallback; } }

function normalizeApiEmail(e) {
  const fromRaw = e.from || "";
  const namePart = fromRaw.includes("<") ? fromRaw.split("<")[0].trim() : fromRaw.split("@")[0];
  return {
    id: e.id || ("api-" + Date.now() + Math.random()),
    from: fromRaw,
    name: namePart || "Unknown",
    subject: e.subject || "(No Subject)",
    date: e.date ? new Date(e.date).toLocaleString() : new Date(e.receivedAt||Date.now()).toLocaleString(),
    body: e.body || e.snippet || "",
    source: "zapier",
  };
}

function buildExport(customers, actions, sfEvents, emails, analysisMap) {
  const out = [];
  out.push("# AI MAIL COMMAND — EXPORT FOR CLAUDE");
  out.push("Exported: " + new Date().toLocaleString());
  out.push("");
  out.push("## CUSTOMER DATABASE (" + customers.length + " contacts)");
  if (!customers.length) { out.push("None yet."); } else {
    customers.forEach(c => {
      out.push("### " + c.name + " — " + c.company);
      out.push("- Email: " + c.email);
      out.push("- Type: " + c.customerType + " | Sentiment: " + c.sentiment);
      out.push("- Emails: " + c.emailCount + " | Last contact: " + c.lastContact);
      if (c.notes) out.push("- Notes: " + c.notes);
      out.push("");
    });
  }
  out.push("## PENDING ACTIONS (" + actions.filter(a=>!a.done).length + " open)");
  const pending = actions.filter(a=>!a.done);
  if (!pending.length) { out.push("None."); } else {
    pending.forEach(a => {
      out.push("- [" + (a.urgency||"").toUpperCase() + "] " + a.task + (a.deadline?" — Due: "+a.deadline:""));
      out.push("  From: " + a.emailSubject);
    });
  }
  out.push("");
  out.push("## ANALYZED EMAILS");
  const analyzed = emails.filter(e=>analysisMap[e.id]);
  if (!analyzed.length) { out.push("None yet."); } else {
    analyzed.forEach(e => {
      const a = analysisMap[e.id];
      out.push("### " + e.subject);
      out.push("From: " + e.from + " | Priority: " + a.priority + " | Sentiment: " + a.sentiment);
      out.push("Summary: " + a.summary);
      if (a.actionItems?.length) out.push("Actions: " + a.actionItems.map(i=>i.task).join("; "));
      out.push("");
    });
  }
  out.push("## SALESFORCE EVENTS (" + sfEvents.length + ")");
  if (!sfEvents.length) { out.push("None yet."); } else {
    sfEvents.forEach(ev => out.push("- ["+ev.type+"] "+ev.subject+" | "+ev.contactName+" @ "+ev.accountName+" | Due: "+ev.activityDate));
  }
  out.push("");
  out.push("---");
  out.push("You now have full context on my customers, actions, and email history. How can you help me?");
  return out.join("\n");
}

function Badge({level}) {
  const C={urgent:{bg:"#fde8e8",c:"#c0392b",b:"#f5c6c6"},high:{bg:"#fef3e2",c:"#d68910",b:"#f9d99a"},medium:{bg:"#e8f4fd",c:"#2471a3",b:"#aed6f1"},low:{bg:"#f4f6f7",c:"#717d7e",b:"#d5d8dc"}};
  const s=C[level]||C.low;
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:s.bg,color:s.c,border:"1px solid "+s.b,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{level}</span>;
}

function CopyBtn({text,label="Copy",big=false}) {
  const [ok,setOk]=useState(false);
  return <button onClick={()=>{navigator.clipboard?.writeText(text);setOk(true);setTimeout(()=>setOk(false),1800);}} style={{fontSize:big?13:11,background:ok?"#e8f8f2":"#f0faf6",border:"1px solid "+(ok?"#0d9e6b":"#0d7a6b"),color:ok?"#0a7a50":"#0d7a6b",borderRadius:6,padding:big?"9px 18px":"5px 12px",cursor:"pointer",fontWeight:700,transition:"all 0.2s",whiteSpace:"nowrap",fontFamily:"inherit"}}>{ok?"✓ Copied!":"📋 "+label}</button>;
}

function SFRow({label,value}) {

    <div style={{fontSize:13,color:"#2a3a50",lineHeight:1.6,wordBreak:"break-word"}}>{value||<span style={{color:"#c8d0d8"}}>—</span>}</div>

const SF_COLORS={"Task":{bg:"#e8f4fd",color:"#2471a3",border:"#aed6f1"},"Event":{bg:"#f4ecfd",color:"#7d3c98",border:"#d2b4de"},"Log a Call":{bg:"#e8f8f0",color:"#1e8449",border:"#a9dfbf"},"Follow-Up":{bg:"#fef3e2",color:"#d68910",border:"#f9d99a"}};

function sfBlock(ev) {
  const L=["SALESFORCE ACTIVITY LOG","━━━━━━━━━━━━━━━━━━━━━━━━━━━━","Type:           "+ev.type,"Subject:        "+ev.subject,"Priority:       "+ev.priority,"Status:         "+ev.status,"Due Date:       "+ev.activityDate,"","CONTACT","Name:           "+ev.contactName,"Email:          "+ev.contactEmail,"Account:        "+ev.accountName,"","DESCRIPTION",ev.description,"","NEXT STEP",ev.nextStep];
  if(ev.callResult&&ev.callResult!=="null")L.push("","Call Result:    "+ev.callResult);
  if(ev.opportunityStage&&ev.opportunityStage!=="null")L.push("Opp. Stage:     "+ev.opportunityStage);
  if(ev.amount&&ev.amount!=="null")L.push("Amount:         "+ev.amount);
  if(ev.sfNotes)L.push("","Notes:",ev.sfNotes);
  return L.join("\n");
}

// ── KB Detail Panel ──────────────────────────────────────────────
function KbDetailPanel({doc, onClose, onSave, onDelete}) {
  const [notes, setNotes] = useState(doc.notes || "");
  const [items, setItems] = useState(doc.items || []);
  const [newItem, setNewItem] = useState("");
  const [saved, setSaved] = useState(false);
  const [editBody, setEditBody] = useState(false);
  const [bodyVal, setBodyVal] = useState(doc.body);

  const catColor={Customer:"#2471a3",Pricing:"#1e8449",Vendor:"#7d3c98",Project:"#d68910",Process:"#c0392b",Other:"#5a7090"};

  function handleSave() {
    onSave({...doc, notes, items, body: bodyVal});
    setSaved(true);
    setTimeout(()=>setSaved(false), 1800);
  }

  function addItem() {
    if (!newItem.trim()) return;
    setItems(prev=>[...prev, {id:Date.now(), text:newItem.trim(), done:false}]);
    setNewItem("");
  }

  function toggleItem(id) {
    setItems(prev=>prev.map(it=>it.id===id?{...it,done:!it.done}:it));
  }

  function removeItem(id) {
    setItems(prev=>prev.filter(it=>it.id!==id));
  }

  return (
    <div style={{background:"#fff",border:"1px solid #dde4ec",borderRadius:12,display:"flex",flexDirection:"column",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",overflow:"hidden"}} className="fadein">
      {/* Header */}
      <div style={{padding:"16px 20px",borderBottom:"1px solid #eef2f7",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,marginRight:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:"#f0f4f8",color:catColor[doc.category]||"#5a7090",border:"1px solid #e0e8f0",fontWeight:700}}>{doc.category}</span>
            <span style={{fontSize:11,color:"#b0bcc8"}}>{doc.date}</span>
          </div>
          <div style={{fontSize:16,fontWeight:700,color:"#1a2540",lineHeight:1.3}}>{doc.title}</div>
        </div>
        <div style={{display:"flex",gap:6"}}>
          <button onClick={()=>onDelete(doc.id)} style={{background:"transparent",border:"1px solid #fcc",color:"#c0392b",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>🗑 Delete</button>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid #c0ccd8",color:"#7a8a9a",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>✕</button>
        </div>
      </div>

      {/* Scrollable body */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 20px",display:"flex",flexDirection:"column",gap:16}}>

        {/* Original Content */}
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#0d7a6b",textTransform:"uppercase",letterSpacing:"0.08em"}}>📄 Content</div>
            <button onClick={()=>setEditBody(v=>!v)} style={{fontSize:11,background:"#f8fafc",border:"1px solid #d0dce8",color:"#5a7090",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontFamily:"inherit"}}>{editBody?"Done editing":"✏️ Edit"}</button>
          </div>
          {editBody ? (
            <textarea
              value={bodyVal}
              onChange={e=>setBodyVal(e.target.value)}
              rows={6}
              style={{width:"100%",background:"#f8fafc",border:"1px solid #0d7a6b",borderRadius:8,padding:"10px 12px",color:"#1a2540",fontSize:12,resize:"vertical",fontFamily:"inherit",lineHeight:1.7}}
            />
          ) : (
            <div style={{background:"#f8fafc",borderRadius:8,padding:"12px 14px",border:"1px solid #e8edf2",fontSize:12,color:"#3a5070",lineHeight:1.8,whiteSpace:"pre-wrap",maxHeight:180,overflowY:"auto"}}>
              {bodyVal}
            </div>
          )}
        </div>

        {/* Action Items */}
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#d68910",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>⚡ Action Items / Next Steps</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
            {items.length===0 && <div style={{fontSize:12,color:"#c0ccd8",fontStyle:"italic",padding:"8px 0"}}>No action items yet — add one below</div>}
            {items.map(it=>(
              <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,background:"#fffbf0",border:"1px solid #f0e8d0",borderRadius:7,padding:"7px 10px"}}>
                <input type="checkbox" checked={it.done} onChange={()=>toggleItem(it.id)} style={{width:14,height:14,cursor:"pointer",accentColor:"#d68910",flexShrink:0}}/>
                <span style={{flex:1,fontSize:12,color:it.done?"#b0bcc8":"#2a3a50",textDecoration:it.done?"line-through":"none"}}>{it.text}</span>
                <button onClick={()=>removeItem(it.id)} style={{background:"transparent",border:"none",color:"#c0ccd8",cursor:"pointer",fontSize:13,padding:0,lineHeight:1,flexShrink:0}}>×</button>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <input
              value={newItem}
              onChange={e=>setNewItem(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addItem(); } }}
              placeholder="Add action item… (Enter to add)"
              style={{flex:1,background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:6,padding:"7px 10px",color:"#1a2540",fontSize:12,fontFamily:"inherit"}}
            />
            <button onClick={addItem} style={{background:"#fef3e2",border:"1px solid #f9d99a",color:"#d68910",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>+ Add</button>
          </div>
        </div>

        {/* Additional Notes */}
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#5a7090",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>📝 Additional Notes</div>
          <textarea
            value={notes}
            onChange={e=>setNotes(e.target.value)}
            placeholder="Add context, updates, related contacts, links, or anything else relevant to this project…"
            rows={5}
            style={{width:"100%",background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:8,padding:"10px 12px",color:"#1a2540",fontSize:12,resize:"vertical",fontFamily:"inherit",lineHeight:1.7}}
          />
        </div>
      </div>

      {/* Save footer */}
      <div style={{padding:"12px 20px",borderTop:"1px solid #eef2f7",display:"flex",gap:8}}>
        <button onClick={handleSave} style={{flex:1,background:saved?"#0a9e6b":"#0d7a6b",border:"none",color:"white",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",transition:"all 0.2s"}}>
          {saved ? "✓ Saved!" : "💾 Save Changes"}
        </button>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid #c0ccd8",color:"#7a8a9a",borderRadius:8,padding:"10px 16px",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>Close</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab]           = useState(0);
  const [emails, setEmails]     = useState(()=>load("emails", SAMPLE_EMAILS));
  const [amap, setAmap]         = useState(()=>load("amap", {}));
  const [customers, setCust]    = useState(()=>load("customers", []));
  const [actions, setActs]      = useState(()=>load("actions", []));
  const [sfEvents, setSF]       = useState(()=>load("sf", []));
  const [selEmail, setSelEmail] = useState(null);
  const [loadingId, setLoading] = useState(null);
  const [pasteMode, setPaste]   = useState(false);
  const [pFrom, setPFrom]       = useState("");
  const [pSubj, setPSubj]       = useState("");
  const [pBody, setPBody]       = useState("");
  const [selCust, setSelCust]   = useState(null);
  const [actFilter, setActF]    = useState("all");
  const [selSF, setSelSF]       = useState(null);
  const [sfFilter, setSFFilter] = useState("all");
  const [showExport, setExport] = useState(false);
  const [showClear, setClear]   = useState(false);
  const [saved, setSaved]       = useState(false);
  const [liveStatus, setLiveStatus] = useState("idle");
  const knownIds = useRef(new Set(emails.map(e=>e.id)));
  const [kbDocs, setKbDocs]         = useState(()=>load("kbDocs", []));
  const [kbChat, setKbChat]         = useState([]);
  const [kbInput, setKbInput]       = useState("");
  const [kbLoading, setKbLoading]   = useState(false);
  const [kbDocTitle, setKbDocTitle] = useState("");
  const [kbDocBody, setKbDocBody]   = useState("");
  const [kbDocCat, setKbDocCat]     = useState("Customer");
  const [kbAddMode, setKbAddMode]   = useState(false);
  const [kbSelDoc, setKbSelDoc]     = useState(null); // NEW: selected doc for detail view
  const chatEndRef = useRef(null);

  useEffect(() => {
    async function fetchLive() {
      try {
        setLiveStatus("checking");
        const res = await fetch("/api/emails");
        if (!res.ok) { setLiveStatus("idle"); return; }
        const data = await res.json();
        if (!data.success || !data.emails?.length) { setLiveStatus("idle"); return; }
        const incoming = data.emails
          .map(normalizeApiEmail)
          .filter(e => !knownIds.current.has(e.id));
        if (incoming.length > 0) {
          incoming.forEach(e => knownIds.current.add(e.id));
          setEmails(prev => {
            const withoutSamples = prev.filter(e => !e.id.startsWith("s"));
            const merged = [...incoming, ...withoutSamples];
            return merged;
          });
          setLiveStatus("new");
          setTimeout(() => setLiveStatus("idle"), 4000);
        } else {
          setLiveStatus("idle");
        }
      } catch(e) {
        setLiveStatus("idle");
      }
    }
    fetchLive();
    const interval = setInterval(fetchLive, 60000);
    return () => clearInterval(interval);
  }, []);

  useEffect(()=>{ save("emails",emails); },[emails]);
  useEffect(()=>{ save("amap",amap); },[amap]);
  useEffect(()=>{ save("customers",customers); },[customers]);
  useEffect(()=>{ save("actions",actions); },[actions]);

  async function analyze(email) {
    if (amap[email.id]) { setSelEmail({...email, analysis:amap[email.id]}); return; }
    setLoading(email.id); setSelEmail({...email, loading:true});
    try {
      const today = new Date().toISOString().split("T")[0];
      const res = await fetch("/api/analyze", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1500,
          system:`You are an expert email assistant and CRM specialist. Analyze emails and return ONLY valid JSON (no markdown) with this structure: {"priority":"urgent|high|medium|low","summary":"2-3 sentence summary","sentiment":"positive|neutral|concerned|negative","customerType":"B2B|B2C|prospect|vendor|internal","keyPoints":["p1","p2","p3"],"actionItems":[{"task":"t","deadline":"d or null","urgency":"urgent|high|medium|low"}],"draftReply":"professional reply","customerProfile":{"name":"full name","email":"email","company":"company","notes":"key info"},"salesforceEvents":[{"type":"Task|Event|Log a Call|Follow-Up","subject":"max 80 chars","description":"log text","priority":"High|Normal|Low","status":"Not Started|In Progress|Completed|Waiting on someone else|Deferred","activityDate":"YYYY-MM-DD today is ${today}","contactName":"name","contactEmail":"email","accountName":"company","callResult":"Connected|Left Voicemail|Not Reached|null","nextStep":"next step","opportunityStage":"Prospecting|Qualification|Needs Analysis|Value Proposition|Id. Decision Makers|Perception Analysis|Proposal/Price Quote|Negotiation/Review|Closed Won|Closed Lost|null","amount":"amount or null","sfNotes":"notes"}]}`,
          messages:[{role:"user",content:"From: "+email.from+"\nSubject: "+email.subject+"\n\n"+email.body}]
        })
      });
      const data = await res.json();
      const raw = data.content?.map(b=>b.text||"").join("")||"{}";
      const analysis = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setAmap(prev=>({...prev,[email.id]:analysis}));
      setSelEmail({...email,analysis});
      if (analysis.customerProfile) {
        setCust(prev=>{
          const ex=prev.find(c=>c.email===analysis.customerProfile.email);
          if(ex) return prev.map(c=>c.email===analysis.customerProfile.email?{...c,notes:analysis.customerProfile.notes,lastContact:email.date,emailCount:(c.emailCount||1)+1,sentiment:analysis.sentiment}:c);
          return [...prev,{...analysis.customerProfile,id:Date.now(),lastContact:email.date,emailCount:1,sentiment:analysis.sentiment,customerType:analysis.customerType}];
        });
      }
      if (analysis.actionItems?.length) setActs(prev=>[...prev,...analysis.actionItems.map(a=>({...a,id:Date.now()+Math.random(),emailSubject:email.subject,done:false}))]);
      if (analysis.salesforceEvents?.length) setSF(prev=>[...prev,...analysis.salesforceEvents.map(e=>({...e,id:Date.now()+Math.random(),emailSubject:email.subject}))]);
    } catch(err) { setSelEmail({...email,error:"Analysis failed. Check your API key and try again."}); }
    setLoading(null);
  }

              {fActions.map(a=><div key={a.id} className="hov" style={{background:"#fff",border:"1px solid #dde4ec",borderRadius:10,padding:"13px 16px",display:"flex",alignItems:"center",gap:14,opacity:a.done?0.5:1,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                <input type="checkbox" checked={a.done} onChange={()=>setActs(prev=>prev.map(x=>x.id===a.id?{...x,done:!x.done}:x))} style={{width:16,height:16,cursor:"pointer",accentColor:"#0d7a6b"}}/>
                <div style={{flex:1}}><div style={{fontSize:13,color:a.done?"#9ab0c0":"#1a2540",fontWeight:500,textDecoration:a.done?"line-through":"none"}}>{a.task}</div><div style={{fontSize:11,color:"#9ab0c0",marginTop:2}}>{a.emailSubject}</div></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>{a.deadline&&<span style={{fontSize:11,color:"#8a9ab0"}}>{a.deadline}</span>}<Badge level={a.urgency}/></div>
              </div>)}
            </div>
          </div>
        )}

        {/* ── SALESFORCE EVENTS ── */}
        {tab===3 && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div><div style={{fontSize:16,fontWeight:700,marginBottom:2}}>☁ Salesforce Events</div><div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace"}}>Ready to copy-paste · {sfEvents.length} events</div></div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {["all","Task","Event","Log a Call","Follow-Up"].map(f=><button key={f} onClick={()=>setSFFilter(f)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:600,background:sfFilter===f?"#4a6acf":"#fff",borderColor:sfFilter===f?"#4a6acf":"#c0ccd8",color:sfFilter===f?"white":"#5a7090"}}>{f}</button>)}
              </div>
            </div>
            {sfEvents.length===0 && <div style={{textAlign:"center",padding:80,color:"#b0bcc8"}}><div style={{fontSize:52,marginBottom:12}}>☁</div><div style={{fontSize:14,fontWeight:500,marginBottom:6}}>No Salesforce events yet</div><div style={{fontSize:12}}>Click any email in Triage to auto-generate SF events</div></div>}
            {sfEvents.length>0 && <>
              <div style={{background:"#f0f6ff",border:"1px solid #c0d4f0",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:20}}>💡</span>
                <span style={{fontSize:12,color:"#3a5a90",lineHeight:1.6}}><strong style={{color:"#1a3a70"}}>How to use:</strong> Click any event to expand it. Use individual <strong style={{color:"#1a3a70"}}>Copy</strong> buttons per field, or <strong style={{color:"#1a3a70"}}>Copy All Fields</strong> to grab everything at once.</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:selSF?"320px 1fr":"repeat(auto-fill,minmax(340px,1fr))",gap:14}}>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {fSF.map(ev=>{
                    const tc=SF_COLORS[ev.type]||SF_COLORS["Task"]; const isSel=selSF?.id===ev.id;
                    return <div key={ev.id} className="hov" onClick={()=>setSelSF(isSel?null:ev)} style={{...card(isSel),padding:"14px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div style={{display:"flex",gap:6}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:5,...tc,fontWeight:700}}>{ev.type}</span><span style={{fontSize:10,padding:"2px 8px",borderRadius:5,background:"#f0f4f8",color:"#5a7090",border:"1px solid #c8d4e0"}}>{ev.priority}</span></div>
                        <span style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace"}}>{ev.activityDate}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{ev.subject}</div>
                      <div style={{fontSize:11,color:"#7a90a8",marginBottom:4}}>{ev.contactName} · {ev.accountName}</div>
                      <div style={{fontSize:11,color:"#9ab0c0",marginBottom:10}}>Status: {ev.status}</div>
                      <CopyBtn text={sfBlock(ev)} label="Copy All Fields"/>
                    </div>;
                  })}
                </div>
                {selSF && <div style={panel} className="fadein">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
                    <div>
                      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                        {(()=>{const tc=SF_COLORS[selSF.type]||SF_COLORS["Task"];return<span style={{fontSize:11,padding:"3px 10px",borderRadius:6,...tc,fontWeight:700}}>{selSF.type}</span>;})()}
                        <span style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:"#f0f4f8",color:"#5a7090",border:"1px solid #c8d4e0"}}>{selSF.priority} Priority</span>
                        <span style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:"#f8fafc",color:"#7a90a8",border:"1px solid #d0dce8"}}>{selSF.status}</span>
                      </div>
                      <div style={{fontSize:15,fontWeight:700}}>{selSF.subject}</div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <CopyBtn text={sfBlock(selSF)} label="Copy All"/>
                      <button onClick={()=>setSelSF(null)} style={{background:"transparent",border:"1px solid #c0ccd8",color:"#7a8a9a",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>✕</button>
                    </div>
                  </div>
                  <div style={{borderTop:"1px solid #e8edf2"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Core Fields</div>
                    <SFRow label="Activity Type" value={selSF.type}/>
                    <SFRow label="Subject" value={selSF.subject}/>
                    <SFRow label="Priority" value={selSF.priority}/>
                    <SFRow label="Status" value={selSF.status}/>
                    <SFRow label="Due Date" value={selSF.activityDate}/>
                    <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Contact & Account</div>
                    <SFRow label="Contact Name" value={selSF.contactName}/>
                    <SFRow label="Contact Email" value={selSF.contactEmail}/>
                    <SFRow label="Account Name" value={selSF.accountName}/>
                    <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Activity Details</div>
                    <SFRow label="Description" value={selSF.description}/>
                    <SFRow label="Next Step" value={selSF.nextStep}/>
                    {selSF.callResult&&selSF.callResult!=="null"&&<SFRow label="Call Result" value={selSF.callResult}/>}
                    {selSF.opportunityStage&&selSF.opportunityStage!=="null"&&<SFRow label="Opp. Stage" value={selSF.opportunityStage}/>}
                    {selSF.amount&&selSF.amount!=="null"&&<SFRow label="Amount" value={selSF.amount}/>}
                    {selSF.sfNotes&&<SFRow label="Notes" value={selSF.sfNotes}/>}
                    <div style={{marginTop:20,background:"#f8fafc",borderRadius:10,padding:16,border:"1px solid #d0dce8"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>📋 Full Block</div>
                      <pre style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#5a7090",whiteSpace:"pre-wrap",lineHeight:1.8,margin:0}}>{sfBlock(selSF)}</pre>
                      <div style={{marginTop:14}}><CopyBtn text={sfBlock(selSF)} label="Copy Entire Block" big={true}/></div>
                    </div>
                  </div>
                </div>}
              </div>
            </>}
          </div>
        )}

        {/* ── KNOWLEDGE BASE ── */}
        {tab===4 && (
          <div style={{display:"grid",gridTemplateColumns:kbSelDoc?"300px 1fr":"300px 1fr",gap:16,minHeight:"75vh"}}>
            {/* LEFT: Doc list + add */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>Knowledge Base · {kbDocs.length} docs</span>
                <button onClick={()=>{ setKbAddMode(v=>!v); setKbSelDoc(null); }} style={{fontSize:11,background:"#f0faf6",border:"1px solid #0d7a6b",color:"#0d7a6b",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>+ Add</button>
              </div>
              {kbAddMode && (
                <div style={{background:"#fff",border:"1px solid #0d7a6b",borderRadius:12,padding:14,marginBottom:12}} className="fadein">
                  <div style={{fontSize:11,fontWeight:700,color:"#0d7a6b",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Add Knowledge</div>
                  <select value={kbDocCat} onChange={e=>setKbDocCat(e.target.value)} style={{width:"100%",background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:6,padding:"7px 10px",color:"#1a2540",fontSize:12,marginBottom:6,fontFamily:"inherit"}}>
                    <option>Customer</option>
                    <option>Pricing</option>
                    <option>Vendor</option>
                    <option>Project</option>
                    <option>Process</option>
                    <option>Other</option>
                  </select>
                  <input value={kbDocTitle} onChange={e=>setKbDocTitle(e.target.value)} placeholder="Title (e.g. Acme Corp pricing)" style={{width:"100%",background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:6,padding:"7px 10px",color:"#1a2540",fontSize:12,marginBottom:6,fontFamily:"inherit"}}/>
                  <textarea value={kbDocBody} onChange={e=>setKbDocBody(e.target.value)} placeholder="Paste your data here — customer notes, pricing tables, vendor lists, project details..." rows={6} style={{width:"100%",background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:6,padding:"7px 10px",color:"#1a2540",fontSize:12,resize:"vertical",marginBottom:8,fontFamily:"inherit"}}/>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>{
                      if(!kbDocTitle.trim()||!kbDocBody.trim()) return;
                      setKbDocs(prev=>[{id:Date.now(),title:kbDocTitle,body:kbDocBody,category:kbDocCat,date:new Date().toLocaleDateString(),notes:"",items:[]},...prev]);
                      setKbDocTitle(""); setKbDocBody(""); setKbAddMode(false);
                    }} style={{flex:1,background:"#0d7a6b",border:"none",color:"white",borderRadius:6,padding:"8px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>Save to Knowledge Base</button>
                    <button onClick={()=>setKbAddMode(false)} style={{background:"transparent",border:"1px solid #c0ccd8",color:"#7a8a9a",borderRadius:6,padding:"8px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
                  </div>
                </div>
              )}
              {kbDocs.length===0 && !kbAddMode && <div style={{textAlign:"center",padding:40,color:"#b0bcc8"}}><div style={{fontSize:36,marginBottom:8}}>🧠</div><div style={{fontSize:13,fontWeight:500,marginBottom:4}}>No knowledge yet</div><div style={{fontSize:11}}>Add customers, pricing, vendors, projects</div></div>}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {kbDocs.map(doc=>{
                  const catColor={Customer:"#2471a3",Pricing:"#1e8449",Vendor:"#7d3c98",Project:"#d68910",Process:"#c0392b",Other:"#5a7090"};
                  const isSelected = kbSelDoc?.id === doc.id;
                  const hasNotes = doc.notes && doc.notes.trim().length > 0;
                  const hasItems = doc.items && doc.items.length > 0;
                  return <div
                    key={doc.id}
                    className="kb-card"
                    onClick={()=>{ setKbSelDoc(isSelected ? null : doc); setKbAddMode(false); }}
                    style={{background:isSelected?"#f0faf6":"#fff",border:"1px solid "+(isSelected?"#0d7a6b":"#dde4ec"),borderRadius:10,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",transition:"all 0.15s",position:"relative"}}
                  >
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <span style={{fontWeight:600,fontSize:13,flex:1,marginRight:8,color:isSelected?"#0d7a6b":"#1a2540"}}>{doc.title}</span>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}>
                        {(hasNotes||hasItems) && <span style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:"#f0faf6",color:"#0d7a6b",border:"1px solid #b0ddd0",fontWeight:700}}>+notes</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"#f0f4f8",color:catColor[doc.category]||"#5a7090",border:"1px solid #e0e8f0",fontWeight:700}}>{doc.category}</span>
                      <span style={{fontSize:10,color:"#b0bcc8"}}>{doc.date}</span>
                    </div>
                    {hasItems && <div style={{marginTop:6,fontSize:10,color:"#8a9ab0"}}>{doc.items.filter(i=>!i.done).length} action{doc.items.filter(i=>!i.done).length!==1?"s":""} pending</div>}
                    {isSelected && <div style={{position:"absolute",right:-8,top:"50%",transform:"translateY(-50%)",width:0,height:0,borderTop:"8px solid transparent",borderBottom:"8px solid transparent",borderLeft:"8px solid #0d7a6b"}}/>}
                  </div>;
                })}
              </div>
            </div>

            {/* RIGHT: Detail panel OR AI Chat */}
            {kbSelDoc ? (
              <KbDetailPanel
                doc={kbSelDoc}
                onClose={()=>setKbSelDoc(null)}
                onSave={handleKbSave}
                onDelete={handleKbDelete}
              />
            ) : (
              <div style={{background:"#fff",border:"1px solid #dde4ec",borderRadius:12,display:"flex",flexDirection:"column",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                <div style={{padding:"16px 20px",borderBottom:"1px solid #eef2f7"}}>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>🧠 AI Assistant</div>
                  <div style={{fontSize:11,color:"#8a9ab0"}}>Ask anything about your customers, pricing, vendors, or projects · or click any doc to view & edit it</div>
                </div>
                <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:12,minHeight:300}}>
                  {kbChat.length===0 && <div style={{textAlign:"center",paddingTop:60,color:"#b0bcc8"}}>
                    <div style={{fontSize:36,marginBottom:12}}>💬</div>
                    <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Ask me anything</div>
                    <div style={{fontSize:11,lineHeight:1.8,color:"#c0ccd8"}}>
                      "What's the pricing for Acme Corp?"<br/>
                      "Which vendors does my customer use?"<br/>
                      "What's the status of the Miami project?"<br/>
                      "Summarize my notes on this customer"
                    </div>
                    {kbDocs.length > 0 && <div style={{marginTop:20,fontSize:11,color:"#a0b0c0"}}>← Click any doc to view details &amp; add notes</div>}
                  </div>}
                  {kbChat.map((msg,i)=>(
                    <div key={i} style={{display:"flex",flexDirection:msg.role==="user"?"row-reverse":"row",gap:10,alignItems:"flex-start"}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:msg.role==="user"?"#0d7a6b":"linear-gradient(135deg,#0d7a6b,#0a5a8a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"white",flexShrink:0}}>{msg.role==="user"?"You":"AI"}</div>
                      <div style={{background:msg.role==="user"?"#f0faf6":"#f8fafc",border:"1px solid",borderColor:msg.role==="user"?"#b0ddd0":"#e0e8f0",borderRadius:10,padding:"10px 14px",maxWidth:"80%",fontSize:13,color:"#2a3a50",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{msg.content}</div>
                    </div>
                  ))}
                  {kbLoading && <div style={{display:"flex",gap:10,alignItems:"center"}}><div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#0d7a6b,#0a5a8a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"white"}}>AI</div><div style={{background:"#f8fafc",border:"1px solid #e0e8f0",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#8a9ab0",display:"flex",gap:6,alignItems:"center"}}><div style={{width:10,height:10,border:"2px solid #0d7a6b",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Thinking…</div></div>}
                  <div ref={chatEndRef}/>
                </div>
                <div style={{padding:"12px 16px",borderTop:"1px solid #eef2f7",display:"flex",gap:8}}>
                  <textarea
                    value={kbInput}
                    onChange={e=>setKbInput(e.target.value)}
                    onKeyDown={async e=>{
                      if(e.key==="Enter"&&!e.shiftKey){
                        e.preventDefault();
                        if(!kbInput.trim()||kbLoading) return;
                        const question = kbInput.trim();
                        setKbInput("");
                        setKbChat(prev=>[...prev,{role:"user",content:question}]);
                        setKbLoading(true);
                        try {
                          const kbContext = kbDocs.length>0
                            ? "KNOWLEDGE BASE:\n\n" + kbDocs.map(d=>`[${d.category}] ${d.title}:\n${d.body}${d.notes?"\n\nAdditional Notes:\n"+d.notes:""}${d.items?.length?"\n\nAction Items:\n"+d.items.map(i=>"- ["+(i.done?"done":"pending")+"] "+i.text).join("\n"):""}`).join("\n\n---\n\n")
                            : "No knowledge base documents have been added yet.";
                          const res = await fetch("/api/analyze",{
                            method:"POST",headers:{"Content-Type":"application/json"},
                            body:JSON.stringify({
                              model:"claude-sonnet-4-20250514",max_tokens:1000,
                              system:`You are a helpful AI assistant for Isaac Adams, Director of Enterprise Development at PayCargo. You have access to his knowledge base containing customer info, pricing, vendors, projects and more. Answer questions clearly and concisely based on the knowledge base. If the answer isn't in the knowledge base, say so and offer general help.\n\n${kbContext}`,
                              messages:[...kbChat.map(m=>({role:m.role,content:m.content})),{role:"user",content:question}]
                            })
                          });
                          const data = await res.json();
                          const answer = data.content?.map(b=>b.text||"").join("")||"Sorry, I couldn't get a response.";
                          setKbChat(prev=>[...prev,{role:"assistant",content:answer}]);
                        } catch(err) {
                          setKbChat(prev=>[...prev,{role:"assistant",content:"Error getting response. Please try again."}]);
                        }
                        setKbLoading(false);
                        setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
                      }
                    }}
                    placeholder="Ask about your customers, pricing, vendors, projects… (Enter to send)"
                    rows={2}
                    style={{flex:1,background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:8,padding:"10px 12px",color:"#1a2540",fontSize:13,resize:"none",fontFamily:"inherit"}}
                  />
                  <button onClick={async()=>{
                    if(!kbInput.trim()||kbLoading) return;
                    const question = kbInput.trim();
                    setKbInput("");
                    setKbChat(prev=>[...prev,{role:"user",content:question}]);
                    setKbLoading(true);
                    try {
                      const kbContext = kbDocs.length>0
                        ? "KNOWLEDGE BASE:\n\n" + kbDocs.map(d=>`[${d.category}] ${d.title}:\n${d.body}${d.notes?"\n\nAdditional Notes:\n"+d.notes:""}${d.items?.length?"\n\nAction Items:\n"+d.items.map(i=>"- ["+(i.done?"done":"pending")+"] "+i.text).join("\n"):""}`).join("\n\n---\n\n")
                        : "No knowledge base documents have been added yet.";
                      const res = await fetch("/api/analyze",{
                        method:"POST",headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                          model:"claude-sonnet-4-20250514",max_tokens:1000,
                          system:`You are a helpful AI assistant for Isaac Adams, Director of Enterprise Development at PayCargo. You have access to his knowledge base containing customer info, pricing, vendors, projects and more. Answer questions clearly and concisely based on the knowledge base. If the answer isn't in the knowledge base, say so and offer general help.\n\n${kbContext}`,
                          messages:[...kbChat.map(m=>({role:m.role,content:m.content})),{role:"user",content:question}]
                        })
                      });
                      const data = await res.json();
                      const answer = data.content?.map(b=>b.text||"").join("")||"Sorry, I couldn't get a response.";
                      setKbChat(prev=>[...prev,{role:"assistant",content:answer}]);
                    } catch(err) {
                      setKbChat(prev=>[...prev,{role:"assistant",content:"Error getting response. Please try again."}]);
                    }
                    setKbLoading(false);
                    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
                  }} style={{background:"#0d7a6b",border:"none",color:"white",borderRadius:8,padding:"0 18px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",alignSelf:"stretch"}}>Send</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
