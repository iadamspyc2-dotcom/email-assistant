<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Mail Command</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans','Segoe UI',sans-serif; background:#f0f4f8; min-height:100vh; color:#1a2540; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:#f0f4f8; }
  ::-webkit-scrollbar-thumb { background:#c0ccd8; border-radius:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadein { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
  .fadein { animation:fadein 0.25s ease; }
  .hov:hover { background:#eef2f7 !important; border-color:#b0c0d0 !important; }
  input,textarea { outline:none; }
  input:focus,textarea:focus { border-color:#0d7a6b !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const TABS = ["📥 Email Triage","👥 Customer Database","📋 Action Board","☁️ Salesforce Events"];
const sampleEmails = [
  {id:1,from:"sarah.chen@designstudio.com",name:"Sarah Chen",subject:"Website redesign proposal - urgent feedback needed",date:"Today, 9:14 AM",body:"Hi,\n\nI wanted to follow up on the website redesign proposal I sent last week. We're on a tight timeline and need your feedback by end of week to keep our launch date.\n\nThe key questions:\n1. Are you happy with the color palette and brand direction?\n2. Can you approve the budget increase of $4,200 for the additional animations?\n3. Do you want to proceed with the mobile-first approach?\n\nPlease let me know ASAP.\n\nBest,\nSarah"},
  {id:2,from:"mike.torres@retailco.com",name:"Mike Torres",subject:"Q1 order - checking in",date:"Today, 7:55 AM",body:"Hey,\n\nJust checking in on the Q1 order we placed back in January. We haven't received tracking info yet and we're running low on inventory.\n\nOrder #RT-2024-0892. Can you let me know where things stand?\n\nThanks,\nMike"},
  {id:3,from:"j.patel@innovatetech.io",name:"Jayesh Patel",subject:"Partnership opportunity - let's connect",date:"Yesterday, 4:22 PM",body:"Hello,\n\nI came across your work and I think there's a strong alignment between our companies. We're building an AI-powered logistics platform and could use a partner with your expertise in supply chain.\n\nWould you be open to a 30-minute call this week or next?\n\nLooking forward to connecting.\n\nJayesh Patel\nCo-founder, InnovateTech"}
];

function PriorityBadge({level}){
  const colors={urgent:{bg:"#fde8e8",color:"#c0392b",border:"#f5c6c6"},high:{bg:"#fef3e2",color:"#d68910",border:"#f9d99a"},medium:{bg:"#e8f4fd",color:"#2471a3",border:"#aed6f1"},low:{bg:"#f4f6f7",color:"#717d7e",border:"#d5d8dc"}};
  const c=colors[level]||colors.low;
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:c.bg,color:c.color,border:`1px solid ${c.border}`,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{level}</span>;
}

function CopyButton({text,label="Copy"}){
  const [copied,setCopied]=useState(false);
  return <button onClick={()=>{navigator.clipboard?.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),1800);}} style={{fontSize:11,background:copied?"#e8f8f2":"#f0faf6",border:`1px solid ${copied?"#0d9e6b":"#0d7a6b"}`,color:copied?"#0a7a50":"#0d7a6b",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontWeight:700,transition:"all 0.2s",whiteSpace:"nowrap",fontFamily:"inherit"}}>{copied?"✓ Copied!":`📋 ${label}`}</button>;
}

function SFField({label,value}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"160px 1fr auto",gap:10,alignItems:"flex-start",padding:"10px 0",borderBottom:"1px solid #e8edf2"}}>
      <div style={{fontSize:11,color:"#7a90a8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",paddingTop:2}}>{label}</div>
      <div style={{fontSize:13,color:"#2a3a50",lineHeight:1.6,wordBreak:"break-word"}}>{value||<span style={{color:"#c8d0d8"}}>—</span>}</div>
      {value&&<CopyButton text={value} label="Copy"/>}
    </div>
  );
}

const sfTypeColor={
  "Task":{bg:"#e8f4fd",color:"#2471a3",border:"#aed6f1"},
  "Event":{bg:"#f4ecfd",color:"#7d3c98",border:"#d2b4de"},
  "Log a Call":{bg:"#e8f8f0",color:"#1e8449",border:"#a9dfbf"},
  "Follow-Up":{bg:"#fef3e2",color:"#d68910",border:"#f9d99a"}
};

function buildSfBlock(ev){
  const lines=["SALESFORCE ACTIVITY LOG","━━━━━━━━━━━━━━━━━━━━━━━━━━━━",`Type:           ${ev.type}`,`Subject:        ${ev.subject}`,`Priority:       ${ev.priority}`,`Status:         ${ev.status}`,`Due Date:       ${ev.activityDate}`,"",`CONTACT`,`Name:           ${ev.contactName}`,`Email:          ${ev.contactEmail}`,`Account:        ${ev.accountName}`,"","DESCRIPTION",ev.description,"","NEXT STEP",ev.nextStep];
  if(ev.callResult&&ev.callResult!=="null")lines.push("",`Call Result:    ${ev.callResult}`);
  if(ev.opportunityStage&&ev.opportunityStage!=="null")lines.push(`Opp. Stage:     ${ev.opportunityStage}`);
  if(ev.amount&&ev.amount!=="null")lines.push(`Amount:         ${ev.amount}`);
  if(ev.sfNotes)lines.push("","Notes:",ev.sfNotes);
  return lines.join("\n");
}

function App(){
  const [activeTab,setActiveTab]=useState(0);
  const [emails,setEmails]=useState(sampleEmails);
  const [selectedEmail,setSelectedEmail]=useState(null);
  const [analysisMap,setAnalysisMap]=useState({});
  const [loadingId,setLoadingId]=useState(null);
  const [customers,setCustomers]=useState([]);
  const [actions,setActions]=useState([]);
  const [sfEvents,setSfEvents]=useState([]);
  const [pasteMode,setPasteMode]=useState(false);
  const [pasteText,setPasteText]=useState("");
  const [pasteFrom,setPasteFrom]=useState("");
  const [pasteSubject,setPasteSubject]=useState("");
  const [selectedCustomer,setSelectedCustomer]=useState(null);
  const [actionFilter,setActionFilter]=useState("all");
  const [selectedSfEvent,setSelectedSfEvent]=useState(null);
  const [sfFilter,setSfFilter]=useState("all");

  async function analyzeEmail(email){
    if(analysisMap[email.id]){setSelectedEmail({...email,analysis:analysisMap[email.id]});return;}
    setLoadingId(email.id);setSelectedEmail({...email,loading:true});
    try{
      const today=new Date().toISOString().split("T")[0];
      const response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1500,
          system:`You are an expert email assistant and CRM specialist. Analyze emails and return ONLY valid JSON (no markdown, no backticks) with this exact structure:{"priority":"urgent|high|medium|low","summary":"2-3 sentence summary","sentiment":"positive|neutral|concerned|negative","customerType":"B2B|B2C|prospect|vendor|internal","keyPoints":["point1","point2","point3"],"actionItems":[{"task":"task","deadline":"deadline or null","urgency":"urgent|high|medium|low"}],"draftReply":"professional reply draft","customerProfile":{"name":"full name","email":"email","company":"company","notes":"key info"},"salesforceEvents":[{"type":"Task|Event|Log a Call|Follow-Up","subject":"SF subject max 80 chars","description":"CRM log description","priority":"High|Normal|Low","status":"Not Started|In Progress|Completed|Waiting on someone else|Deferred","activityDate":"YYYY-MM-DD (today is ${today})","contactName":"name","contactEmail":"email","accountName":"company","callResult":"Connected|Left Voicemail|Not Reached|null","nextStep":"next step","opportunityStage":"Prospecting|Qualification|Needs Analysis|Value Proposition|Id. Decision Makers|Perception Analysis|Proposal/Price Quote|Negotiation/Review|Closed Won|Closed Lost|null","amount":"amount or null","sfNotes":"additional notes"}]}`,
          messages:[{role:"user",content:`From: ${email.from}\nSubject: ${email.subject}\n\n${email.body}`}]
        })
      });
      const data=await response.json();
      const text=data.content?.map(b=>b.text||"").join("")||"{}";
      const clean=text.replace(/```json|```/g,"").trim();
      const analysis=JSON.parse(clean);
      setAnalysisMap(prev=>({...prev,[email.id]:analysis}));
      setSelectedEmail({...email,analysis});
      if(analysis.customerProfile){
        setCustomers(prev=>{
          const exists=prev.find(c=>c.email===analysis.customerProfile.email);
          if(exists)return prev.map(c=>c.email===analysis.customerProfile.email?{...c,notes:analysis.customerProfile.notes,lastContact:email.date,emailCount:(c.emailCount||1)+1,sentiment:analysis.sentiment}:c);
          return [...prev,{...analysis.customerProfile,id:Date.now(),lastContact:email.date,emailCount:1,sentiment:analysis.sentiment,customerType:analysis.customerType}];
        });
      }
      if(analysis.actionItems?.length)setActions(prev=>[...prev,...analysis.actionItems.map(a=>({...a,id:Date.now()+Math.random(),emailSubject:email.subject,from:email.from,done:false}))]);
      if(analysis.salesforceEvents?.length)setSfEvents(prev=>[...prev,...analysis.salesforceEvents.map(e=>({...e,id:Date.now()+Math.random(),emailSubject:email.subject,emailFrom:email.from}))]);
    }catch(err){setSelectedEmail({...email,error:"Analysis failed. Please try again."});}
    setLoadingId(null);
  }

  async function addPastedEmail(){
    if(!pasteText.trim())return;
    const newEmail={id:Date.now(),from:pasteFrom||"unknown@email.com",name:pasteFrom?.split("@")[0]||"Unknown",subject:pasteSubject||"No Subject",date:"Just now",body:pasteText};
    setEmails(prev=>[newEmail,...prev]);
    setPasteMode(false);setPasteText("");setPasteFrom("");setPasteSubject("");
    await analyzeEmail(newEmail);
  }

  const urgencyOrder={urgent:0,high:1,medium:2,low:3};
  const filteredActions=actions.filter(a=>actionFilter==="done"?a.done:actionFilter==="pending"?!a.done:true).sort((a,b)=>(urgencyOrder[a.urgency]??3)-(urgencyOrder[b.urgency]??3));
  const filteredSf=sfEvents.filter(e=>sfFilter==="all"?true:e.type===sfFilter);

  return(
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#f0f4f8",minHeight:"100vh",color:"#1a2540"}}>
      {/* HEADER */}
      <div style={{background:"#ffffff",borderBottom:"1px solid #dde4ec",padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#0d7a6b,#0a5a8a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>✉</div>
          <div>
            <div style={{fontWeight:700,fontSize:17,letterSpacing:"-0.3px",color:"#1a2540"}}>AI Mail Command</div>
            <div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace"}}>Gmail AI Review · Powered by Claude</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {customers.length>0&&<div style={{background:"#e8f4fd",border:"1px solid #aed6f1",borderRadius:8,padding:"4px 12px",fontSize:12,color:"#2471a3"}}>{customers.length} customers</div>}
          {actions.filter(a=>!a.done).length>0&&<div style={{background:"#fde8e8",border:"1px solid #f5c6c6",borderRadius:8,padding:"4px 12px",fontSize:12,color:"#c0392b"}}>{actions.filter(a=>!a.done).length} actions</div>}
          {sfEvents.length>0&&<div style={{background:"#eef2fd",border:"1px solid #c0cef5",borderRadius:8,padding:"4px 12px",fontSize:12,color:"#4a6acf"}}>{sfEvents.length} SF events</div>}
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",gap:2,padding:"12px 28px 0",background:"#ffffff",borderBottom:"1px solid #dde4ec"}}>
        {TABS.map((tab,i)=>(
          <button key={i} onClick={()=>setActiveTab(i)} style={{padding:"8px 18px",borderRadius:"8px 8px 0 0",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:i===activeTab?"#0d7a6b":"transparent",color:i===activeTab?"white":"#5a7090",transition:"all 0.15s",fontFamily:"inherit"}}>{tab}</button>
        ))}
      </div>

      <div style={{padding:"20px 28px",maxWidth:1400,margin:"0 auto"}}>

        {/* EMAIL TRIAGE */}
        {activeTab===0&&(
          <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:16,minHeight:"75vh"}}>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>AI Review · {emails.length} emails</div>
                <button onClick={()=>setPasteMode(v=>!v)} style={{fontSize:11,background:"#f0faf6",border:"1px solid #0d7a6b",color:"#0d7a6b",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>+ Paste Email</button>
              </div>
              {pasteMode&&(
                <div style={{background:"#ffffff",border:"1px solid #0d7a6b",borderRadius:12,padding:14,marginBottom:12}} className="fadein">
                  <div style={{fontSize:11,fontWeight:700,color:"#0d7a6b",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Paste Email</div>
                  <input value={pasteFrom} onChange={e=>setPasteFrom(e.target.value)} placeholder="From (email address)" style={{width:"100%",background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:6,padding:"7px 10px",color:"#1a2540",fontSize:12,marginBottom:6,fontFamily:"inherit"}}/>
                  <input value={pasteSubject} onChange={e=>setPasteSubject(e.target.value)} placeholder="Subject" style={{width:"100%",background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:6,padding:"7px 10px",color:"#1a2540",fontSize:12,marginBottom:6,fontFamily:"inherit"}}/>
                  <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Paste email body…" rows={5} style={{width:"100%",background:"#f8fafc",border:"1px solid #d0dce8",borderRadius:6,padding:"7px 10px",color:"#1a2540",fontSize:12,resize:"vertical",marginBottom:8,fontFamily:"inherit"}}/>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={addPastedEmail} style={{flex:1,background:"#0d7a6b",border:"none",color:"white",borderRadius:6,padding:"8px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>Analyze + Generate SF Events →</button>
                    <button onClick={()=>setPasteMode(false)} style={{background:"transparent",border:"1px solid #c0ccd8",color:"#7a8a9a",borderRadius:6,padding:"8px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
                  </div>
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {emails.map(email=>{
                  const analysis=analysisMap[email.id];
                  const isSelected=selectedEmail?.id===email.id;
                  return(
                    <div key={email.id} className="hov" onClick={()=>analyzeEmail(email)} style={{background:isSelected?"#eef2f7":"#ffffff",border:`1px solid ${isSelected?"#b0c8e0":"#dde4ec"}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <div style={{fontWeight:600,fontSize:13,color:"#1a2540"}}>{email.name}</div>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          {loadingId===email.id&&<div style={{width:10,height:10,border:"2px solid #0d7a6b",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}
                          {analysis&&<PriorityBadge level={analysis.priority}/>}
                        </div>
                      </div>
                      <div style={{fontSize:12,color:"#5a7090",marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{email.subject}</div>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <div style={{fontSize:11,color:"#9ab0c0"}}>{email.date}</div>
                        {analysis?.salesforceEvents?.length>0&&<div style={{fontSize:10,color:"#7a90c0",fontFamily:"'DM Mono',monospace"}}>☁ {analysis.salesforceEvents.length} SF</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{background:"#ffffff",border:"1px solid #dde4ec",borderRadius:12,padding:24,minHeight:400,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              {!selectedEmail&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#b0bcc8",gap:10,paddingTop:80}}><div style={{fontSize:48}}>📬</div><div style={{fontSize:14,fontWeight:500}}>Select an email to analyze</div><div style={{fontSize:12}}>Generates summaries, drafts, actions & Salesforce events</div></div>}
              {selectedEmail?.loading&&<div style={{padding:20}}><div style={{fontSize:14,fontWeight:600,marginBottom:24,color:"#1a2540"}}>{selectedEmail.subject}</div><div style={{display:"flex",alignItems:"center",gap:8,color:"#0d7a6b",fontSize:13}}><div style={{width:14,height:14,border:"2px solid #0d7a6b",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Claude is thinking…</div></div>}
              {selectedEmail?.error&&<div style={{color:"#c0392b",padding:20}}>{selectedEmail.error}</div>}
              {selectedEmail?.analysis&&(()=>{
                const a=selectedEmail.analysis;
                return(
                  <div className="fadein">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
                      <div><div style={{fontSize:16,fontWeight:700,color:"#1a2540",marginBottom:4}}>{selectedEmail.subject}</div><div style={{fontSize:12,color:"#7a90a8"}}>From: {selectedEmail.from} · {selectedEmail.date}</div></div>
                      <div style={{display:"flex",gap:8}}><PriorityBadge level={a.priority}/><span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#f0f4f8",color:"#5a7090",border:"1px solid #c8d4e0"}}>{a.customerType}</span></div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                      <div style={{background:"#f8fafc",borderRadius:10,padding:14,border:"1px solid #dde4ec"}}><div style={{fontSize:10,fontWeight:700,color:"#0d7a6b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>📝 Summary</div><div style={{fontSize:13,color:"#3a5070",lineHeight:1.6}}>{a.summary}</div></div>
                      <div style={{background:"#f8fafc",borderRadius:10,padding:14,border:"1px solid #dde4ec"}}><div style={{fontSize:10,fontWeight:700,color:"#0d7a6b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🎯 Key Points</div><ul style={{margin:0,paddingLeft:16}}>{a.keyPoints?.map((p,i)=><li key={i} style={{fontSize:12,color:"#3a5070",marginBottom:4,lineHeight:1.5}}>{p}</li>)}</ul></div>
                    </div>
                    {a.actionItems?.length>0&&<div style={{background:"#fffbf0",borderRadius:10,padding:14,border:"1px solid #f9d99a",marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:"#d68910",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>⚡ Action Items</div>{a.actionItems.map((item,i)=><div key={i} style={{display:"flex",gap:10,alignItems:"center",background:"#ffffff",borderRadius:7,padding:"8px 12px",marginBottom:6,border:"1px solid #f0e8d0"}}><PriorityBadge level={item.urgency}/><span style={{fontSize:12,color:"#1a2540",flex:1}}>{item.task}</span>{item.deadline&&<span style={{fontSize:11,color:"#8a9ab0"}}>{item.deadline}</span>}</div>)}</div>}
                    {a.salesforceEvents?.length>0&&<div style={{background:"#f0f4ff",borderRadius:10,padding:14,border:"1px solid #c0cef5",marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.08em"}}>☁ Salesforce Events Generated</div><button onClick={()=>setActiveTab(3)} style={{fontSize:11,background:"#e8eefb",border:"1px solid #a0b4e8",color:"#4a6acf",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>View All →</button></div>{a.salesforceEvents.map((ev,i)=>{const tc=sfTypeColor[ev.type]||sfTypeColor["Task"];return<div key={i} style={{display:"flex",gap:10,alignItems:"center",background:"#ffffff",borderRadius:7,padding:"8px 12px",marginBottom:6,border:"1px solid #dde4f0"}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:5,...tc,fontWeight:700}}>{ev.type}</span><span style={{fontSize:12,color:"#1a2540",flex:1}}>{ev.subject}</span><span style={{fontSize:11,color:"#8a9ab0"}}>{ev.activityDate}</span></div>;})}</div>}
                    <div style={{background:"#f8fafc",borderRadius:10,padding:14,border:"1px solid #dde4ec"}}><div style={{fontSize:10,fontWeight:700,color:"#0d7a6b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>✉ Draft Reply</div><pre style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#3a5070",whiteSpace:"pre-wrap",lineHeight:1.7,margin:0}}>{a.draftReply}</pre><div style={{marginTop:10}}><CopyButton text={a.draftReply} label="Copy Reply"/></div></div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}

        {/* CUSTOMER DATABASE */}
        {activeTab===1&&(
          <div>
            <div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>Customer Records · {customers.length} contacts</div>
            {customers.length===0&&<div style={{textAlign:"center",padding:80,color:"#b0bcc8"}}><div style={{fontSize:48,marginBottom:12}}>👥</div><div style={{fontSize:14,fontWeight:500}}>Analyze emails to auto-build your customer database</div></div>}
            {customers.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:selectedCustomer?"280px 1fr":"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {customers.map(c=>(
                    <div key={c.id} className="hov" onClick={()=>setSelectedCustomer(selectedCustomer?.id===c.id?null:c)} style={{background:selectedCustomer?.id===c.id?"#eef2f7":"#ffffff",border:`1px solid ${selectedCustomer?.id===c.id?"#b0c8e0":"#dde4ec"}`,borderRadius:12,padding:16,cursor:"pointer",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div><div style={{fontWeight:700,fontSize:14,color:"#1a2540"}}>{c.name}</div><div style={{fontSize:11,color:"#7a90a8"}}>{c.company}</div></div>
                        <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#f0f4f8",color:"#5a7090",border:"1px solid #c8d4e0"}}>{c.customerType}</span>
                      </div>
                      <div style={{fontSize:11,color:"#7a90a8",marginBottom:3}}>📧 {c.email}</div>
                      <div style={{fontSize:11,color:"#7a90a8",marginBottom:8}}>🕐 {c.lastContact}</div>
                      <div style={{display:"flex",gap:6}}>
                        <span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"#f0f4f8",color:"#5a7090",border:"1px solid #c8d4e0"}}>{c.emailCount} email{c.emailCount!==1?"s":""}</span>
                        {c.sentiment&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"#f0f4f8",color:c.sentiment==="positive"?"#1e8449":c.sentiment==="negative"?"#c0392b":"#5a7090",border:"1px solid #c8d4e0"}}>{c.sentiment}</span>}
                      </div>
                    </div>
                  ))}
                </div>
                {selectedCustomer&&(
                  <div style={{background:"#ffffff",border:"1px solid #dde4ec",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}} className="fadein">
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                      <div><div style={{fontSize:20,fontWeight:700,color:"#1a2540",marginBottom:2}}>{selectedCustomer.name}</div><div style={{fontSize:13,color:"#7a90a8"}}>{selectedCustomer.company} · {selectedCustomer.customerType}</div></div>
                      <button onClick={()=>setSelectedCustomer(null)} style={{background:"transparent",border:"1px solid #c0ccd8",color:"#7a8a9a",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>✕</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                      {[["Email",selectedCustomer.email],["Last Contact",selectedCustomer.lastContact],["Total Emails",selectedCustomer.emailCount],["Sentiment",selectedCustomer.sentiment]].map(([label,val])=>(
                        <div key={label} style={{background:"#f8fafc",borderRadius:8,padding:12,border:"1px solid #dde4ec"}}><div style={{fontSize:10,color:"#8a9ab0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{label}</div><div style={{fontSize:13,color:"#2a3a50"}}>{val}</div></div>
                      ))}
                    </div>
                    <div style={{background:"#f8fafc",borderRadius:10,padding:14,border:"1px solid #dde4ec"}}><div style={{fontSize:10,fontWeight:700,color:"#0d7a6b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>AI Notes</div><div style={{fontSize:13,color:"#3a5070",lineHeight:1.7}}>{selectedCustomer.notes}</div></div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ACTION BOARD */}
        {activeTab===2&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>Action Board · {actions.filter(a=>!a.done).length} pending</div>
              <div style={{display:"flex",gap:6}}>{["all","pending","done"].map(f=><button key={f} onClick={()=>setActionFilter(f)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:600,textTransform:"capitalize",background:actionFilter===f?"#0d7a6b":"#ffffff",borderColor:actionFilter===f?"#0d7a6b":"#c0ccd8",color:actionFilter===f?"white":"#5a7090"}}>{f}</button>)}</div>
            </div>
            {actions.length===0&&<div style={{textAlign:"center",padding:80,color:"#b0bcc8"}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div style={{fontSize:14,fontWeight:500}}>Analyze emails to auto-generate your action list</div></div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filteredActions.map(action=>(
                <div key={action.id} className="hov" style={{background:"#ffffff",border:"1px solid #dde4ec",borderRadius:10,padding:"13px 16px",display:"flex",alignItems:"center",gap:14,transition:"all 0.15s",opacity:action.done?0.5:1,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                  <input type="checkbox" checked={action.done} onChange={()=>setActions(prev=>prev.map(a=>a.id===action.id?{...a,done:!a.done}:a))} style={{width:16,height:16,cursor:"pointer",accentColor:"#0d7a6b"}}/>
                  <div style={{flex:1}}><div style={{fontSize:13,color:action.done?"#9ab0c0":"#1a2540",fontWeight:500,textDecoration:action.done?"line-through":"none"}}>{action.task}</div><div style={{fontSize:11,color:"#9ab0c0",marginTop:2}}>{action.emailSubject}</div></div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>{action.deadline&&<span style={{fontSize:11,color:"#8a9ab0"}}>{action.deadline}</span>}<PriorityBadge level={action.urgency}/></div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* SALESFORCE EVENTS */}
        {activeTab===3&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div><div style={{fontSize:16,fontWeight:700,color:"#1a2540",marginBottom:2}}>☁ Salesforce Events</div><div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace"}}>Ready to copy-paste · {sfEvents.length} events generated</div></div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{["all","Task","Event","Log a Call","Follow-Up"].map(f=><button key={f} onClick={()=>setSfFilter(f)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:600,background:sfFilter===f?"#4a6acf":"#ffffff",borderColor:sfFilter===f?"#4a6acf":"#c0ccd8",color:sfFilter===f?"white":"#5a7090"}}>{f}</button>)}</div>
            </div>
            {sfEvents.length===0&&<div style={{textAlign:"center",padding:80,color:"#b0bcc8"}}><div style={{fontSize:52,marginBottom:12}}>☁</div><div style={{fontSize:14,fontWeight:500,marginBottom:6}}>No Salesforce events yet</div><div style={{fontSize:12}}>Click any email in the Triage tab to auto-generate SF events</div></div>}
            {sfEvents.length>0&&(
              <>
                <div style={{background:"#f0f6ff",border:"1px solid #c0d4f0",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center"}}><div style={{fontSize:20}}>💡</div><div style={{fontSize:12,color:"#3a5a90",lineHeight:1.6}}><strong style={{color:"#1a3a70"}}>How to use:</strong> Click any event to expand it. Use individual <strong style={{color:"#1a3a70"}}>Copy</strong> buttons per field, or <strong style={{color:"#1a3a70"}}>Copy All Fields</strong> to grab everything at once.</div></div>
                <div style={{display:"grid",gridTemplateColumns:selectedSfEvent?"320px 1fr":"repeat(auto-fill,minmax(340px,1fr))",gap:14}}>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {filteredSf.map(ev=>{
                      const tc=sfTypeColor[ev.type]||sfTypeColor["Task"];
                      const isSelected=selectedSfEvent?.id===ev.id;
                      return(
                        <div key={ev.id} className="hov" onClick={()=>setSelectedSfEvent(isSelected?null:ev)} style={{background:isSelected?"#eef2f7":"#ffffff",border:`1px solid ${isSelected?"#b0c8e0":"#dde4ec"}`,borderRadius:10,padding:"14px 16px",cursor:"pointer",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:5,...tc,fontWeight:700}}>{ev.type}</span><span style={{fontSize:10,padding:"2px 8px",borderRadius:5,background:"#f0f4f8",color:"#5a7090",border:"1px solid #c8d4e0"}}>{ev.priority}</span></div><div style={{fontSize:11,color:"#8a9ab0",fontFamily:"'DM Mono',monospace"}}>{ev.activityDate}</div></div>
                          <div style={{fontSize:13,fontWeight:600,color:"#1a2540",marginBottom:4}}>{ev.subject}</div>
                          <div style={{fontSize:11,color:"#7a90a8",marginBottom:4}}>{ev.contactName} · {ev.accountName}</div>
                          <div style={{fontSize:11,color:"#9ab0c0",marginBottom:10}}>Status: {ev.status}</div>
                          <CopyButton text={buildSfBlock(ev)} label="Copy All Fields"/>
                        </div>
                      );
                    })}
                  </div>
                  {selectedSfEvent&&(
                    <div style={{background:"#ffffff",border:"1px solid #dde4ec",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}} className="fadein">
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
                        <div>
                          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>{(()=>{const tc=sfTypeColor[selectedSfEvent.type]||sfTypeColor["Task"];return<span style={{fontSize:11,padding:"3px 10px",borderRadius:6,...tc,fontWeight:700}}>{selectedSfEvent.type}</span>;})()}<span style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:"#f0f4f8",color:"#5a7090",border:"1px solid #c8d4e0"}}>{selectedSfEvent.priority} Priority</span><span style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:"#f8fafc",color:"#7a90a8",border:"1px solid #d0dce8"}}>{selectedSfEvent.status}</span></div>
                          <div style={{fontSize:15,fontWeight:700,color:"#1a2540"}}>{selectedSfEvent.subject}</div>
                        </div>
                        <div style={{display:"flex",gap:8,flexShrink:0}}><CopyButton text={buildSfBlock(selectedSfEvent)} label="Copy All"/><button onClick={()=>setSelectedSfEvent(null)} style={{background:"transparent",border:"1px solid #c0ccd8",color:"#7a8a9a",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>✕</button></div>
                      </div>
                      <div style={{borderTop:"1px solid #e8edf2"}}>
                        <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Core Fields</div>
                        <SFField label="Activity Type" value={selectedSfEvent.type}/>
                        <SFField label="Subject" value={selectedSfEvent.subject}/>
                        <SFField label="Priority" value={selectedSfEvent.priority}/>
                        <SFField label="Status" value={selectedSfEvent.status}/>
                        <SFField label="Due Date" value={selectedSfEvent.activityDate}/>
                        <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Contact & Account</div>
                        <SFField label="Contact Name" value={selectedSfEvent.contactName}/>
                        <SFField label="Contact Email" value={selectedSfEvent.contactEmail}/>
                        <SFField label="Account Name" value={selectedSfEvent.accountName}/>
                        <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Activity Details</div>
                        <SFField label="Description" value={selectedSfEvent.description}/>
                        <SFField label="Next Step" value={selectedSfEvent.nextStep}/>
                        {selectedSfEvent.callResult&&selectedSfEvent.callResult!=="null"&&<SFField label="Call Result" value={selectedSfEvent.callResult}/>}
                        {selectedSfEvent.opportunityStage&&selectedSfEvent.opportunityStage!=="null"&&<SFField label="Opp. Stage" value={selectedSfEvent.opportunityStage}/>}
                        {selectedSfEvent.amount&&selectedSfEvent.amount!=="null"&&<SFField label="Amount" value={selectedSfEvent.amount}/>}
                        {selectedSfEvent.sfNotes&&<SFField label="Notes" value={selectedSfEvent.sfNotes}/>}
                        <div style={{marginTop:20,background:"#f8fafc",borderRadius:10,padding:16,border:"1px solid #d0dce8"}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#4a6acf",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>📋 Full Block — Copy Everything at Once</div>
                          <pre style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#5a7090",whiteSpace:"pre-wrap",lineHeight:1.8,margin:0}}>{buildSfBlock(selectedSfEvent)}</pre>
                          <div style={{marginTop:14}}><CopyButton text={buildSfBlock(selectedSfEvent)} label="Copy Entire Block"/></div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
