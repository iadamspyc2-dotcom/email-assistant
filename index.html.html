<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Mail Command</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #0a0f1a; min-height: 100vh; color: #e2e8f0; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0f1a; }
  ::-webkit-scrollbar-thumb { background: #2a3550; border-radius: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadein { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fadein { animation: fadein 0.25s ease; }
  .hov:hover { background: #141d30 !important; border-color: #2a4060 !important; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const TABS = ["📥 Email Triage", "👥 Customer Database", "📋 Action Board", "☁️ Salesforce Events"];

const sampleEmails = [
  { id: 1, from: "sarah.chen@designstudio.com", name: "Sarah Chen", subject: "Website redesign proposal - urgent feedback needed", date: "Today, 9:14 AM", body: "Hi,\n\nI wanted to follow up on the website redesign proposal I sent last week. We're on a tight timeline and need your feedback by end of week to keep our launch date.\n\nThe key questions:\n1. Are you happy with the color palette and brand direction?\n2. Can you approve the budget increase of $4,200 for the additional animations?\n3. Do you want to proceed with the mobile-first approach?\n\nPlease let me know ASAP.\n\nBest,\nSarah" },
  { id: 2, from: "mike.torres@retailco.com", name: "Mike Torres", subject: "Q1 order - checking in", date: "Today, 7:55 AM", body: "Hey,\n\nJust checking in on the Q1 order we placed back in January. We haven't received tracking info yet and we're running low on inventory.\n\nOrder #RT-2024-0892. Can you let me know where things stand?\n\nThanks,\nMike" },
  { id: 3, from: "j.patel@innovatetech.io", name: "Jayesh Patel", subject: "Partnership opportunity - let's connect", date: "Yesterday, 4:22 PM", body: "Hello,\n\nI came across your work and I think there's a strong alignment between our companies. We're building an AI-powered logistics platform and could use a partner with your expertise in supply chain.\n\nWould you be open to a 30-minute call this week or next?\n\nLooking forward to connecting.\n\nJayesh Patel\nCo-founder, InnovateTech" }
];

function PriorityBadge({ level }) {
  const colors = { urgent: { bg:"#2a0a0a",color:"#e57373",border:"#5a1a1a" }, high:{bg:"#2a1a0a",color:"#e5a03b",border:"#5a3a0a"}, medium:{bg:"#0a1a2a",color:"#4a9ad4",border:"#1a3a5a"}, low:{bg:"#1a2030",color:"#6a7a9a",border:"#2a3050"} };
  const c = colors[level] || colors.low;
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:c.bg,color:c.color,border:`1px solid ${c.border}`,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{level}</span>;
}

function CopyButton({ text, label="Copy" }) {
  const [copied, setCopied] = useState(false);
  return <button onClick={()=>{navigator.clipboard?.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),1800);}} style={{fontSize:11,background:copied?"#0d3a2a":"#0d2a20",border:`1px solid ${copied?"#0d9e6b":"#0d7a6b"}`,color:copied?"#0d9e6b":"#0d9e8b",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontWeight:700,transition:"all 0.2s",whiteSpace:"nowrap",fontFamily:"inherit"}}>{copied?"✓ Copied!":`📋 ${label}`}</button>;
}

function SFField({ label, value }) {
  return (
    <div style={{display:"grid",gridTemplateColumns:"160px 1fr auto",gap:10,alignItems:"flex-start",padding:"10px 0",borderBottom:"1px solid #1a2540"}}>
      <div style={{fontSize:11,color:"#4a7090",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",paddingTop:2}}>{label}</div>
      <div style={{fontSize:13,color:"#c8d8f0",lineHeight:1.6,wordBreak:"break-word"}}>{value||<span style={{color:"#2a3550"}}>—</span>}</div>
      {value && <CopyButton text={value} label="Copy"/>}
    </div>
  );
}

const sfTypeColor = { "Task":{bg:"#0a1a2a",color:"#4a9ad4",border:"#1a3a5a"}, "Event":{bg:"#1a0a2a",color:"#9a6ad4",border:"#3a1a5a"}, "Log a Call":{bg:"#0a1a0a",color:"#4ad48a",border:"#1a4a2a"}, "Follow-Up":{bg:"#2a1a0a",color:"#e5a03b",border:"#5a3a0a"} };

function buildSfBlock(ev) {
  const lines = ["SALESFORCE ACTIVITY LOG","━━━━━━━━━━━━━━━━━━━━━━━━━━━━",`Type:           ${ev.type}`,`Subject:        ${ev.subject}`,`Priority:       ${ev.priority}`,`Status:         ${ev.status}`,`Due Date:       ${ev.activityDate}`,"",`CONTACT`,`Name:           ${ev.contactName}`,`Email:          ${ev.contactEmail}`,`Account:        ${ev.accountName}`,"","DESCRIPTION",ev.description,"","NEXT STEP",ev.nextStep];
  if (ev.callResult && ev.callResult!=="null") lines.push("",`Call Result:    ${ev.callResult}`);
  if (ev.opportunityStage && ev.opportunityStage!=="null") lines.push(`Opp. Stage:     ${ev.opportunityStage}`);
  if (ev.amount && ev.amount!=="null") lines.push(`Amount:         ${ev.amount}`);
  if (ev.sfNotes) lines.push("","Notes:",ev.sfNotes);
  return lines.join("\n");
}

function App() {
  const [activeTab, setActiveTab] = useState(0);
  const [emails, setEmails] = useState(sampleEmails);
  const [selectedEmail, setSelectedEmail] = useState(null);
  const [analysisMap, setAnalysisMap] = useState({});
  const [loadingId, setLoadingId] = useState(null);
  const [customers, setCustomers] = useState([]);
  const [actions, setActions] = useState([]);
  const [sfEvents, setSfEvents] = useState([]);
  const [pasteMode, setPasteMode] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [pasteFrom, setPasteFrom] = useState("");
  const [pasteSubject, setPasteSubject] = useState("");
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [actionFilter, setActionFilter] = useState("all");
  const [selectedSfEvent, setSelectedSfEvent] = useState(null);
  const [sfFilter, setSfFilter] = useState("all");

  async function analyzeEmail(email) {
    if (analysisMap[email.id]) { setSelectedEmail({...email,analysis:analysisMap[email.id]}); return; }
    setLoadingId(email.id);
    setSelectedEmail({...email,loading:true});
    try {
      const today = new Date().toISOString().split("T")[0];
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1500,
          system:`You are an expert email assistant and CRM specialist. Analyze emails and return ONLY valid JSON (no markdown, no backticks) with this exact structure:{"priority":"urgent|high|medium|low","summary":"2-3 sentence summary","sentiment":"positive|neutral|concerned|negative","customerType":"B2B|B2C|prospect|vendor|internal","keyPoints":["point1","point2","point3"],"actionItems":[{"task":"task","deadline":"deadline or null","urgency":"urgent|high|medium|low"}],"draftReply":"professional reply draft","customerProfile":{"name":"full name","email":"email","company":"company","notes":"key info"},"salesforceEvents":[{"type":"Task|Event|Log a Call|Follow-Up","subject":"SF subject max 80 chars","description":"CRM log description","priority":"High|Normal|Low","status":"Not Started|In Progress|Completed|Waiting on someone else|Deferred","activityDate":"YYYY-MM-DD (today is ${today})","contactName":"name","contactEmail":"email","accountName":"company","callResult":"Connected|Left Voicemail|Not Reached|null","nextStep":"next step","opportunityStage":"Prospecting|Qualification|Needs Analysis|Value Proposition|Id. Decision Makers|Perception Analysis|Proposal/Price Quote|Negotiation/Review|Closed Won|Closed Lost|null","amount":"amount or null","sfNotes":"additional notes"}]}`,
          messages:[{role:"user",content:`From: ${email.from}\nSubject: ${email.subject}\n\n${email.body}`}]
        })
      });
      const data = await response.json();
      const text = data.content?.map(b=>b.text||"").join("")||"{}";
      const clean = text.replace(/```json|```/g,"").trim();
      const analysis = JSON.parse(clean);
      setAnalysisMap(prev=>({...prev,[email.id]:analysis}));
      setSelectedEmail({...email,analysis});
      if (analysis.customerProfile) {
        setCustomers(prev=>{
          const exists=prev.find(c=>c.email===analysis.customerProfile.email);
          if(exists) return prev.map(c=>c.email===analysis.customerProfile.email?{...c,notes:analysis.customerProfile.notes,lastContact:email.date,emailCount:(c.emailCount||1)+1,sentiment:analysis.sentiment}:c);
          return [...prev,{...analysis.customerProfile,id:Date.now(),lastContact:email.date,emailCount:1,sentiment:analysis.sentiment,customerType:analysis.customerType,emails:[{subject:email.subject,date:email.date}]}];
        });
      }
      if (analysis.actionItems?.length) setActions(prev=>[...prev,...analysis.actionItems.map(a=>({...a,id:Date.now()+Math.random(),emailSubject:email.subject,from:email.from,done:false}))]);
      if (analysis.salesforceEvents?.length) setSfEvents(prev=>[...prev,...analysis.salesforceEvents.map(e=>({...e,id:Date.now()+Math.random(),emailSubject:email.subject,emailFrom:email.from,createdAt:new Date().toLocaleString()}))]);
    } catch(err) { setSelectedEmail({...email,error:"Analysis failed. Please try again."}); }
    setLoadingId(null);
  }

  async function addPastedEmail() {
    if (!pasteText.trim()) return;
    const newEmail={id:Date.now(),from:pasteFrom||"unknown@email.com",name:pasteFrom?.split("@")[0]||"Unknown",subject:pasteSubject||"No Subject",date:"Just now",body:pasteText};
    setEmails(prev=>[newEmail,...prev]);
    setPasteMode(false);setPasteText("");setPasteFrom("");setPasteSubject("");
    await analyzeEmail(newEmail);
  }

  const urgencyOrder={urgent:0,high:1,medium:2,low:3};
  const filteredActions=actions.filter(a=>actionFilter==="done"?a.done:actionFilter==="pending"?!a.done:true).sort((a,b)=>(urgencyOrder[a.urgency]??3)-(urgencyOrder[b.urgency]??3));
  const filteredSf=sfEvents.filter(e=>sfFilter==="all"?true:e.type===sfFilter);

  return (
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#0a0f1a",minHeight:"100vh",color:"#e2e8f0"}}>
      <div style={{background:"linear-gradient(135deg,#0d1526,#0a1420)",borderBottom:"1px solid #1a2540",padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#0d7a6b,#0a5a8a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>✉</div>
          <div>
            <div style={{fontWeight:700,fontSize:17,letterSpacing:"-0.3px"}}>AI Mail Command</div>
            <div style={{fontSize:11,color:"#3a5070",fontFamily:"'DM Mono',monospace"}}>Gmail AI Review · Powered by Claude</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {customers.length>0&&<div style={{background:"#0d2a40",border:"1px solid #1a4060",borderRadius:8,padding:"4px 12px",fontSize:12,color:"#4ab8d4"}}>{customers.length} customers</div>}
          {actions.filter(a=>!a.done).length>0&&<div style={{background:"#2a1010",border:"1px solid #5a1a1a",borderRadius:8,padding:"4px 12px",fontSize:12,color:"#e57373"}}>{actions.filter(a=>!a.done).length} actions</div>}
          {sfEvents.length>0&&<div style={{background:"#0a1a30",border:"1px solid #1a3a60",borderRadius:8,padding:"4px 12px",fontSize:12,color:"#6090e0"}}>{sfEvents.length} SF events</div>}
        </div>
      </div>

      <div style={{display:"flex",gap:2,padding:"12px 28px 0",borderBottom:"1px solid #1a2540"}}>
        {TABS.map((tab,i)=>(
          <button key={i} onClick={()=>setActiveTab(i)} style={{padding:"8px 18px",borderRadius:"8px 8px 0 0",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:i===activeTab?"#0d7a6b":"transparent",color:i===activeTab?"white":"#4a6080",transition:"all 0.15s",fontFamily:"inherit"}}>{tab}</button>
        ))}
      </div>

      <div style={{padding:"20px 28px",maxWidth:1400,margin:"0 auto"}}>

        {activeTab===0&&(
          <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:16,minHeight:"75vh"}}>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:11,color:"#3a5070",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>AI Review · {emails.length} emails</div>
                <button onClick={()=>setPasteMode(v=>!v)} style={{fontSize:11,background:"#0d2a20",border:"1px solid #0d7a6b",color:"#0d9e8b",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>+ Paste Email</button>
              </div>
              {pasteMode&&(
                <div style={{background:"#0d1526",border:"1px solid #0d7a6b",borderRadius:12,padding:14,marginBottom:12}} className="fadein">
                  <div style={{fontSize:11,fontWeight:700,color:"#0d9e8b",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Paste Email</div>
                  <input value={pasteFrom} onChange={e=>setPasteFrom(e.target.value)} placeholder="From (email address)" style={{width:"100%",background:"#060d1a",border:"1px solid #1a2540",borderRadius:6,padding:"7px 10px",color:"#e2e8f0",fontSize:12,marginBottom:6,fontFamily:"inherit"}}/>
                  <input value={pasteSubject} onChange={e=>setPasteSubject(e.target.value)} placeholder="Subject" style={{width:"100%",background:"#060d1a",border:"1px solid #1a2540",borderRadius:6,padding:"7px 10px",color:"#e2e8f0",fontSize:12,marginBottom:6,fontFamily:"inherit"}}/>
                  <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Paste email body…" rows={5} style={{width:"100%",background:"#060d1a",border:"1px solid #1a2540",borderRadius:6,padding:"7px 10px",color:"#e2e8f0",fontSize:12,resize:"vertical",marginBottom:8,fontFamily:"inherit"}}/>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={addPastedEmail} style={{flex:1,background:"#0d7a6b",border:"none",color:"white",borderRadius:6,padding:"8px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>Analyze + Generate SF Events →</button>
                    <button onClick={()=>setPasteMode(false)} style={{background:"transparent",border:"1px solid #2a3550",color:"#4a6080",borderRadius:6,padding:"8px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
                  </div>
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {emails.map(email=>{
                  const analysis=analysisMap[email.id];
                  const isSelected=selectedEmail?.id===email.id;
                  return(
                    <div key={email.id} className="hov" onClick={()=>analyzeEmail(email)} style={{background:isSelected?"#141d30":"#0d1526",border:`1px solid ${isSelected?"#2a4060":"#1a2540"}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",transition:"all 0.15s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <div style={{fontWeight:600,fontSize:13,color:"#c8d8f0"}}>{email.name}</div>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          {loadingId===email.id&&<div style={{width:10,height:10,border:"2px solid #0d7a6b",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}
                          {analysis&&<PriorityBadge level={analysis.priority}/>}
                        </div>
                      </div>
                      <div style={{fontSize:12,color:"#4a6080",marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{email.subject}</div>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <div style={{fontSize:11,color:"#2a4060"}}>{email.date}</div>
                        {analysis?.salesforceEvents?.length>0&&<div style={{fontSize:10,color:"#3a6090",fontFamily:"'DM Mono',monospace"}}>☁ {analysis.salesforceEvents.length} SF</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{background:"#0d1526",border:"1px solid #1a2540",borderRadius:12,padding:24,minHeight:400}}>
              {!selectedEmail&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#2a4060",gap:10,paddingTop:80}}><div style={{fontSize:48}}>📬</div><div style={{fontSize:14,fontWeight:500}}>Select an email to analyze</div><div style={{fontSize:12}}>Generates summaries, drafts, actions & Salesforce events</div></div>}
              {selectedEmail?.loading&&<div style={{padding:20}}><div style={{fontSize:14,fontWeight:600,marginBottom:24,color:"#c8d8f0"}}>{selectedEmail.subject}</div><div style={{display:"flex",alignItems:"center",gap:8,color:"#0d9e8b",fontSize:13}}><div style={{width:14,height:14,border:"2px solid #0d9e8b",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Claude is thinking…</div></div>}
              {selectedEmail?.error&&<div style={{color:"#e57373",padding:20}}>{selectedEmail.error}</div>}
              {selectedEmail?.analysis&&(()=>{
                const a=selectedEmail.analysis;
                return(
                  <div className="fadein">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
                      <div><div style={{fontSize:16,fontWeight:700,color:"#c8d8f0",marginBottom:4}}>{selectedEmail.subject}</div><div style={{fontSize:12,color:"#3a5070"}}>From: {selectedEmail.from} · {selectedEmail.date}</div></div>
                      <div style={{display:"flex",gap:8}}><PriorityBadge level={a.priority}/><span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#1a2540",color:"#6080a0",border:"1px solid #2a3550"}}>{a.customerType}</span></div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                      <div style={{background:"#060d1a",borderRadius:10,padding:14,border:"1px solid #1a2540"}}><div style={{fontSize:10,fontWeight:700,color:"#0d9e8b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>📝 Summary</div><div style={{fontSize:13,color:"#9ab8d4",lineHeight:1.6}}>{a.summary}</div></div>
                      <div style={{background:"#060d1a",borderRadius:10,padding:14,border:"1px solid #1a2540"}}><div style={{fontSize:10,fontWeight:700,color:"#0d9e8b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🎯 Key Points</div><ul style={{margin:0,paddingLeft:16}}>{a.keyPoints?.map((p,i)=><li key={i} style={{fontSize:12,color:"#9ab8d4",marginBottom:4,lineHeight:1.5}}>{p}</li>)}</ul></div>
                    </div>
                    {a.actionItems?.length>0&&<div style={{background:"#0a0f1a",borderRadius:10,padding:14,border:"1px solid #2a1a0a",marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:"#e59e3b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>⚡ Action Items</div>{a.actionItems.map((item,i)=><div key={i} style={{display:"flex",gap:10,alignItems:"center",background:"#0d1526",borderRadius:7,padding:"8px 12px",marginBottom:6}}><PriorityBadge level={item.urgency}/><span style={{fontSize:12,color:"#c8d8f0",flex:1}}>{item.task}</span>{item.deadline&&<span style={{fontSize:11,color:"#4a6080"}}>{item.deadline}</span>}</div>)}</div>}
                    {a.salesforceEvents?.length>0&&<div style={{background:"#060d1a",borderRadius:10,padding:14,border:"1px solid #1a3060",marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:"#6090e0",textTransform:"uppercase",letterSpacing:"0.08em"}}>☁ Salesforce Events Generated</div><button onClick={()=>setActiveTab(3)} style={{fontSize:11,background:"#0a1a40",border:"1px solid #2a4080",color:"#6090e0",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>View All →</button></div>{a.salesforceEvents.map((ev,i)=>{const tc=sfTypeColor[ev.type]||sfTypeColor["Task"];return<div key={i} style={{display:"flex",gap:10,alignItems:"center",background:"#0d1526",borderRadius:7,padding:"8px 12px",marginBottom:6}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:5,...tc,fontWeight:700}}>{ev.type}</span><span style={{fontSize:12,color:"#c8d8f0",flex:1}}>{ev.subject}</span><span style={{fontSize:11,color:"#4a6080"}}>{ev.activityDate}</span></div>;})}</div>}
                    <div style={{background:"#060d1a",borderRadius:10,padding:14,border:"1px solid #1a2540"}}><div style={{fontSize:10,fontWeight:700,color:"#0d9e8b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>✉ Draft Reply</div><pre style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#9ab8d4",whiteSpace:"pre-wrap",lineHeight:1.7,margin:0}}>{a.draftReply}</pre><div style={{marginTop:10}}><CopyButton text={a.draftReply} label="Copy Reply"/></div></div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}

        {activeTab===1&&(
          <div>
            <div style={{fontSize:11,color:"#3a5070",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>Customer Records · {customers.length} contacts</div>
            {customers.length===0&&<div style={{textAlign:"center",padding:80,color:"#2a4060"}}><div style={{fontSize:48,marginBottom:12}}>👥</div><div style={{fontSize:14,fontWeight:500}}>Analyze emails to auto-build your customer database</div></div>}
            {customers.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:selectedCustomer?"280px 1fr":"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {customers.map(c=>(
                    <div key={c.id} className="hov" onClick={()=>setSelectedCustomer(selectedCustomer?.id===c.id?null:c)} style={{background:selectedCustomer?.id===c.id?"#141d30":"#0d1526",border:`1px solid ${selectedCustomer?.id===c.id?"#2a4060":"#1a2540"}`,borderRadius:12,padding:16,cursor:"pointer",transition:"all 0.15s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div><div style={{fontWeight:700,fontSize:14,color:"#c8d8f0"}}>{c.name}</div><div style={{fontSize:11,color:"#4a6080"}}>{c.company}</div></div>
                        <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#1a2540",color:"#6080a0",border:"1px solid #2a3550"}}>{c.customerType}</span>
                      </div>
                      <div style={{fontSize:11,color:"#4a6080",marginBottom:3}}>📧 {c.email}</div>
                      <div style={{fontSize:11,color:"#4a6080",marginBottom:8}}>🕐 {c.lastContact}</div>
                      <div style={{display:"flex",gap:6}}>
                        <span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"#0a0f1a",color:"#4a7090",border:"1px solid #1a2540"}}>{c.emailCount} email{c.emailCount!==1?"s":""}</span>
                        {c.sentiment&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"#0a0f1a",color:c.sentiment==="positive"?"#4a9a6a":c.sentiment==="negative"?"#9a4a4a":"#6a7a9a",border:"1px solid #1a2540"}}>{c.sentiment}</span>}
                      </div>
                    </div>
                  ))}
                </div>
                {selectedCustomer&&(
                  <div style={{background:"#0d1526",border:"1px solid #1a2540",borderRadius:12,padding:24}} className="fadein">
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                      <div><div style={{fontSize:20,fontWeight:700,color:"#c8d8f0",marginBottom:2}}>{selectedCustomer.name}</div><div style={{fontSize:13,color:"#4a6080"}}>{selectedCustomer.company} · {selectedCustomer.customerType}</div></div>
                      <button onClick={()=>setSelectedCustomer(null)} style={{background:"transparent",border:"1px solid #2a3550",color:"#4a6080",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>✕</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                      {[["Email",selectedCustomer.email],["Last Contact",selectedCustomer.lastContact],["Total Emails",selectedCustomer.emailCount],["Sentiment",selectedCustomer.sentiment]].map(([label,val])=>(
                        <div key={label} style={{background:"#060d1a",borderRadius:8,padding:12,border:"1px solid #1a2540"}}><div style={{fontSize:10,color:"#4a6080",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{label}</div><div style={{fontSize:13,color:"#9ab8d4"}}>{val}</div></div>
                      ))}
                    </div>
                    <div style={{background:"#060d1a",borderRadius:10,padding:14,border:"1px solid #1a2540"}}><div style={{fontSize:10,fontWeight:700,color:"#0d9e8b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>AI Notes</div><div style={{fontSize:13,color:"#9ab8d4",lineHeight:1.7}}>{selectedCustomer.notes}</div></div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {activeTab===2&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:11,color:"#3a5070",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>Action Board · {actions.filter(a=>!a.done).length} pending</div>
              <div style={{display:"flex",gap:6}}>{["all","pending","done"].map(f=><button key={f} onClick={()=>setActionFilter(f)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:600,textTransform:"capitalize",background:actionFilter===f?"#0d7a6b":"transparent",borderColor:actionFilter===f?"#0d7a6b":"#2a3550",color:actionFilter===f?"white":"#4a6080"}}>{f}</button>)}</div>
            </div>
            {actions.length===0&&<div style={{textAlign:"center",padding:80,color:"#2a4060"}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div style={{fontSize:14,fontWeight:500}}>Analyze emails to auto-generate your action list</div></div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filteredActions.map(action=>(
                <div key={action.id} className="hov" style={{background:"#0d1526",border:"1px solid #1a2540",borderRadius:10,padding:"13px 16px",display:"flex",alignItems:"center",gap:14,transition:"all 0.15s",opacity:action.done?0.5:1}}>
                  <input type="checkbox" checked={action.done} onChange={()=>setActions(prev=>prev.map(a=>a.id===action.id?{...a,done:!a.done}:a))} style={{width:16,height:16,cursor:"pointer",accentColor:"#0d7a6b"}}/>
                  <div style={{flex:1}}><div style={{fontSize:13,color:action.done?"#4a6080":"#c8d8f0",fontWeight:500,textDecoration:action.done?"line-through":"none"}}>{action.task}</div><div style={{fontSize:11,color:"#2a4060",marginTop:2}}>{action.emailSubject}</div></div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>{action.deadline&&<span style={{fontSize:11,color:"#4a6080"}}>{action.deadline}</span>}<PriorityBadge level={action.urgency}/></div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab===3&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div><div style={{fontSize:16,fontWeight:700,color:"#c8d8f0",marginBottom:2}}>☁ Salesforce Events</div><div style={{fontSize:11,color:"#3a5070",fontFamily:"'DM Mono',monospace"}}>Ready to copy-paste · {sfEvents.length} events generated</div></div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{["all","Task","Event","Log a Call","Follow-Up"].map(f=><button key={f} onClick={()=>setSfFilter(f)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:600,background:sfFilter===f?"#1a3a80":"transparent",borderColor:sfFilter===f?"#3a6adf":"#2a3550",color:sfFilter===f?"#8ab0ff":"#4a6080"}}>{f}</button>)}</div>
            </div>
            {sfEvents.length===0&&<div style={{textAlign:"center",padding:80,color:"#2a4060"}}><div style={{fontSize:52,marginBottom:12}}>☁</div><div style={{fontSize:14,fontWeight:500,marginBottom:6}}>No Salesforce events yet</div><div style={{fontSize:12}}>Click any email in the Triage tab to auto-generate SF events</div></div>}
            {sfEvents.length>0&&(
              <>
                <div style={{background:"#0a1630",border:"1px solid #1a3060",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center"}}><div style={{fontSize:20}}>💡</div><div style={{fontSize:12,color:"#6090c0",lineHeight:1.6}}><strong style={{color:"#90b0e0"}}>How to use:</strong> Click any event to expand it. Use individual <strong style={{color:"#90b0e0"}}>Copy</strong> buttons per field, or <strong style={{color:"#90b0e0"}}>Copy All Fields</strong> to grab everything at once.</div></div>
                <div style={{display:"grid",gridTemplateColumns:selectedSfEvent?"320px 1fr":"repeat(auto-fill,minmax(340px,1fr))",gap:14}}>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {filteredSf.map(ev=>{
                      const tc=sfTypeColor[ev.type]||sfTypeColor["Task"];
                      const isSelected=selectedSfEvent?.id===ev.id;
                      return(
                        <div key={ev.id} className="hov" onClick={()=>setSelectedSfEvent(isSelected?null:ev)} style={{background:isSelected?"#141d30":"#0d1526",border:`1px solid ${isSelected?"#2a4060":"#1a2540"}`,borderRadius:10,padding:"14px 16px",cursor:"pointer",transition:"all 0.15s"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:5,...tc,fontWeight:700}}>{ev.type}</span><span style={{fontSize:10,padding:"2px 8px",borderRadius:5,background:"#1a2540",color:"#6080a0",border:"1px solid #2a3550"}}>{ev.priority}</span></div><div style={{fontSize:11,color:"#3a5070",fontFamily:"'DM Mono',monospace"}}>{ev.activityDate}</div></div>
                          <div style={{fontSize:13,fontWeight:600,color:"#c8d8f0",marginBottom:4}}>{ev.subject}</div>
                          <div style={{fontSize:11,color:"#4a6080",marginBottom:4}}>{ev.contactName} · {ev.accountName}</div>
                          <div style={{fontSize:11,color:"#3a5070",marginBottom:10,fontStyle:"italic"}}>Status: {ev.status}</div>
                          <CopyButton text={buildSfBlock(ev)} label="Copy All Fields"/>
                        </div>
                      );
                    })}
                  </div>
                  {selectedSfEvent&&(
                    <div style={{background:"#0d1526",border:"1px solid #1a2540",borderRadius:12,padding:24}} className="fadein">
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
                        <div>
                          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>{(()=>{const tc=sfTypeColor[selectedSfEvent.type]||sfTypeColor["Task"];return<span style={{fontSize:11,padding:"3px 10px",borderRadius:6,...tc,fontWeight:700}}>{selectedSfEvent.type}</span>;})()}<span style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:"#1a2540",color:"#6080a0",border:"1px solid #2a3550"}}>{selectedSfEvent.priority} Priority</span><span style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:"#0a1530",color:"#4a7090",border:"1px solid #1a3050"}}>{selectedSfEvent.status}</span></div>
                          <div style={{fontSize:15,fontWeight:700,color:"#c8d8f0"}}>{selectedSfEvent.subject}</div>
                        </div>
                        <div style={{display:"flex",gap:8,flexShrink:0}}><CopyButton text={buildSfBlock(selectedSfEvent)} label="Copy All"/><button onClick={()=>setSelectedSfEvent(null)} style={{background:"transparent",border:"1px solid #2a3550",color:"#4a6080",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>✕</button></div>
                      </div>
                      <div style={{borderTop:"1px solid #1a2540"}}>
                        <div style={{fontSize:10,fontWeight:700,color:"#6090e0",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Core Fields</div>
                        <SFField label="Activity Type" value={selectedSfEvent.type}/>
                        <SFField label="Subject" value={selectedSfEvent.subject}/>
                        <SFField label="Priority" value={selectedSfEvent.priority}/>
                        <SFField label="Status" value={selectedSfEvent.status}/>
                        <SFField label="Due Date" value={selectedSfEvent.activityDate}/>
                        <div style={{fontSize:10,fontWeight:700,color:"#6090e0",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Contact & Account</div>
                        <SFField label="Contact Name" value={selectedSfEvent.contactName}/>
                        <SFField label="Contact Email" value={selectedSfEvent.contactEmail}/>
                        <SFField label="Account Name" value={selectedSfEvent.accountName}/>
                        <div style={{fontSize:10,fontWeight:700,color:"#6090e0",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 0 4px"}}>Activity Details</div>
                        <SFField label="Description" value={selectedSfEvent.description}/>
                        <SFField label="Next Step" value={selectedSfEvent.nextStep}/>
                        {selectedSfEvent.callResult&&selectedSfEvent.callResult!=="null"&&<SFField label="Call Result" value={selectedSfEvent.callResult}/>}
                        {selectedSfEvent.opportunityStage&&selectedSfEvent.opportunityStage!=="null"&&<SFField label="Opp. Stage" value={selectedSfEvent.opportunityStage}/>}
                        {selectedSfEvent.amount&&selectedSfEvent.amount!=="null"&&<SFField label="Amount" value={selectedSfEvent.amount}/>}
                        {selectedSfEvent.sfNotes&&<SFField label="Notes" value={selectedSfEvent.sfNotes}/>}
                        <div style={{marginTop:20,background:"#060d1a",borderRadius:10,padding:16,border:"1px solid #1a3060"}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#6090e0",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>📋 Full Block — Copy Everything at Once</div>
                          <pre style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#6090b0",whiteSpace:"pre-wrap",lineHeight:1.8,margin:0}}>{buildSfBlock(selectedSfEvent)}</pre>
                          <div style={{marginTop:14}}><CopyButton text={buildSfBlock(selectedSfEvent)} label="Copy Entire Block"/></div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
